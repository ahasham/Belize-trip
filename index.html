<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

<script type="text/babel">
const {useState,useEffect,useRef}=React;
const LS={get:async k=>{try{const v=localStorage.getItem(k);return v?{value:v}:null}catch{return null}},set:async(k,v)=>{try{localStorage.setItem(k,v)}catch{}}};
const TE={flight:"✈️",transport:"🚐",hotel:"🏨",food:"🍽️",activity:"⭐"};
function getTD(){const d=new Date(),m=d.getMonth(),dd=d.getDate();if(m===3&&dd>=10&&dd<=20)return dd-10;return -1;}

function speakKriol(text){if(!window.speechSynthesis)return;const u=new SpeechSynthesisUtterance(text);u.rate=0.85;u.pitch=1.1;window.speechSynthesis.speak(u);}

// Offline indicator
function OfflineBar(){
  const[online,setOnline]=useState(navigator.onLine);
  useEffect(()=>{const on=()=>setOnline(true),off=()=>setOnline(false);window.addEventListener("online",on);window.addEventListener("offline",off);return()=>{window.removeEventListener("online",on);window.removeEventListener("offline",off)};},[]);
  if(online)return null;
  return<div style={{background:"#C06050",color:"#fff",textAlign:"center",padding:"6px 12px",fontSize:12,fontWeight:700,position:"fixed",top:0,left:0,right:0,zIndex:9999}}>📡 You're offline — some features may not work</div>;
}

// OSRM route fetcher (for driving segments only)
async function fetchDriveRoute(fromPt,toPt){
  try{
    const url="https://router.project-osrm.org/route/v1/driving/"+fromPt.lon+","+fromPt.lat+";"+toPt.lon+","+toPt.lat+"?overview=full&geometries=geojson";
    const r=await fetch(url);const d=await r.json();
    if(d.routes&&d.routes[0]&&d.routes[0].geometry)return d.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]);
  }catch{}
  return[[fromPt.lat,fromPt.lon],[toPt.lat,toPt.lon]]; // fallback straight line
}

// Flight arc (curved line between two points)
function flightArc(from,to,n){
  const pts=[];const midLat=(from.lat+to.lat)/2;const midLon=(from.lon+to.lon)/2;
  const dx=to.lon-from.lon;const dy=to.lat-from.lat;const dist=Math.sqrt(dx*dx+dy*dy);
  const bulge=Math.min(dist*0.15,5);
  for(let i=0;i<=n;i++){const t=i/n;const lat=from.lat+t*(to.lat-from.lat)+bulge*Math.sin(Math.PI*t);
    const lon=from.lon+t*(to.lon-from.lon);pts.push([lat,lon]);}
  return pts;
}

// Weather - dayOffset: 0=today, 1=tomorrow, etc. Shows forecast for the day we'll be there
function Wx({loc,compact,dayOffset}){
  const[wx,setWx]=useState(null);
  const off=dayOffset||0;
  useEffect(()=>{if(!loc||!LOCS[loc])return;const{lat,lon}=LOCS[loc];
    fetch("https://api.open-meteo.com/v1/forecast?latitude="+lat+"&longitude="+lon+"&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weathercode,uv_index_max&current=temperature_2m,weathercode&timezone=America/Belize&forecast_days="+Math.max(off+2,3))
    .then(r=>r.json()).then(d=>{if(d.daily)setWx(d)}).catch(()=>{});
  },[loc,off]);
  const ic=c=>c<=1?"☀️":c<=3?"⛅":c<=55?"🌧️":"⛈️";
  if(!wx||!wx.daily||!wx.daily.time[off])return <div style={{fontSize:12,color:"#7A9B8E",padding:4}}>Loading weather...</div>;
  const t=wx.daily;
  const uv=t.uv_index_max&&t.uv_index_max[off]?Math.round(t.uv_index_max[off]):10;
  // If off===0, show current temp. Otherwise show forecast for that day
  return <div>
    {off===0?<div style={{display:"flex",alignItems:"center",gap:6,marginBottom:compact?4:6}}>
      <span style={{fontSize:compact?16:20}}>{ic(wx.current?.weathercode)}</span>
      <span style={{fontSize:compact?16:20,fontWeight:700,color:"#E8A838"}}>{Math.round(wx.current?.temperature_2m)}°C</span>
      <span style={{fontSize:10,color:"#7BBAA0",fontWeight:600}}>NOW</span>
    </div>:<div style={{display:"flex",alignItems:"center",gap:6,marginBottom:compact?4:6}}>
      <span style={{fontSize:compact?16:20}}>{ic(t.weathercode[off])}</span>
      <span style={{fontSize:compact?16:20,fontWeight:700,color:"#E8A838"}}>{Math.round(t.temperature_2m_max[off])}°C</span>
      <span style={{fontSize:10,color:"#7BBAA0",fontWeight:600}}>FORECAST</span>
      <span style={{fontSize:9,color:"#7A9B8E"}}>{t.time[off]}</span>
    </div>}
    <div style={{display:"flex",gap:6}}>
      {[off,off+1].filter(i=>i<t.time.length).map(i=><div key={t.time[i]} style={{background:"rgba(0,0,0,.2)",borderRadius:10,padding:"5px 8px",flex:1,textAlign:"center"}}>
        <div style={{fontSize:8,color:"#7BBAA0",fontWeight:600}}>{i===off?(off===0?"TODAY":"THIS DAY"):"NEXT"}</div>
        <div style={{fontSize:12}}>{ic(t.weathercode[i])}</div>
        <div style={{fontSize:12,fontWeight:700,color:"#E8A838"}}>{Math.round(t.temperature_2m_max[i])}°</div>
        <div style={{fontSize:10,color:"#9BB8A8"}}>{Math.round(t.temperature_2m_min[i])}°</div>
        <div style={{fontSize:8,color:"#56B4D3"}}>💧{t.precipitation_probability_max[i]}%</div>
      </div>)}
    </div>
    {!compact&&<div style={{marginTop:6,padding:"4px 8px",background:"rgba(232,168,56,.1)",borderRadius:8,fontSize:11,color:"#E8A838"}}>
      🧴 UV Index: <strong>{uv}/11</strong> — {uv>=8?"Very High! Reapply sunscreen every 2hrs":uv>=6?"High — wear sunscreen & hat":"Moderate"} 
    </div>}
  </div>;
}

// Map
function TripMap({tripDay,groupFilter}){
  const mapRef=useRef(null),mapInst=useRef(null),layRef=useRef({r:[],m:[],gps:null}),tilesRef=useRef(null);
  const[sat,setSat]=useState(false),[pin,setPin]=useState(null);
  const gP=id=>MAP_PTS.find(p=>p.id===id);
  const pCol=t=>t==="stay"?"#E8A838":t==="activity"?"#7BBAA0":"#56B4D3";

  useEffect(()=>{
    if(mapInst.current||!mapRef.current)return;
    const m=L.map(mapRef.current,{zoomControl:false,attributionControl:false}).setView([17.2,-88.5],8);
    L.control.zoom({position:"bottomright"}).addTo(m);
    tilesRef.current=L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:18}).addTo(m);
    mapInst.current=m;
    if(navigator.geolocation){navigator.geolocation.watchPosition(p=>{
      const ll=[p.coords.latitude,p.coords.longitude];
      if(layRef.current.gps)layRef.current.gps.setLatLng(ll);
      else{const gi=L.divIcon({className:"",html:'<div style="position:relative"><div class="gps-pulse"></div><div style="position:absolute;top:4px;left:4px;width:12px;height:12px;background:#FF6B6B;border:2px solid #fff;border-radius:50%"></div></div>',iconSize:[20,20],iconAnchor:[10,10]});
        layRef.current.gps=L.marker(ll,{icon:gi,zIndexOffset:1000}).bindTooltip("📍 You",{className:"pin-pop",direction:"top"}).addTo(m);}
    },()=>{},{enableHighAccuracy:true,maximumAge:30000,timeout:10000});}
  },[]);

  useEffect(()=>{if(!mapInst.current||!tilesRef.current)return;mapInst.current.removeLayer(tilesRef.current);
    tilesRef.current=L.tileLayer(sat?"https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}":"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:18}).addTo(mapInst.current);
  },[sat]);

  useEffect(()=>{
    if(!mapInst.current)return;const m=mapInst.current;
    layRef.current.r.forEach(l=>m.removeLayer(l));layRef.current.m.forEach(l=>m.removeLayer(l));
    layRef.current.r=[];layRef.current.m=[];
    const dy=tripDay>=0?tripDay:0,inBZ=dy>=1&&dy<=9;
    const rt=dy<DAY_RT.length?DAY_RT[dy]:null;
    const td=getTD(); // actual today
    const gf=groupFilter||"ALL";
    const bounds=[];

    // Past days: dashed faded thin lines
    DAY_RT.slice(0,dy).forEach(dr=>{dr.segs.forEach(s=>{const f=gP(s.from),t=gP(s.to);if(!f||!t)return;
      const l=L.polyline([[f.lat,f.lon],[t.lat,t.lon]],{color:"rgba(123,186,160,.2)",weight:1.5,dashArray:"6,4"}).addTo(m);layRef.current.r.push(l);});});

    // Draw a route segment with proper styling
    const drawSeg=async(s,color,isSecondary)=>{
      const f=gP(s.from),t=gP(s.to);if(!f||!t)return;
      bounds.push([f.lat,f.lon],[t.lat,t.lon]);
      let pts;const tIcon=s.t==="fly"?"✈️":s.t==="boat"?"⛵":"🚐";
      if(s.t==="drive"){pts=await fetchDriveRoute(f,t)}
      else if(s.t==="fly"){pts=flightArc(f,t,30)}
      else if(s.t==="boat"){
        // Boat: create a slight curve so we get >2 points for icon placement
        const mid=[(f.lat+t.lat)/2+0.01,(f.lon+t.lon)/2+0.005];
        pts=[[f.lat,f.lon],mid,[t.lat,t.lon]];
      }
      else{pts=[[f.lat,f.lon],[t.lat,t.lon]]}
      // Today+future = SOLID, past = dashed (past days handled above, but if viewing a past day, still solid for that day's detail)
      const style={color,weight:s.t==="drive"?3.5:2.5,opacity:isSecondary?.7:.85};
      if(isSecondary){style.weight=2.5;style.opacity=.7;}
      const l=L.polyline(pts,style).addTo(m);layRef.current.r.push(l);
      // Transport icon at midpoint — works for ALL segment types now
      const mi=Math.floor(pts.length/2);const mid=pts[mi];
      const next=pts[Math.min(mi+1,pts.length-1)];const prev=pts[Math.max(mi-1,0)];
      const dx=next[1]-prev[1],ddy=next[0]-prev[0];
      const ang=Math.atan2(dx,ddy)*180/Math.PI;
      const ti=L.divIcon({className:"",html:'<div style="font-size:22px;line-height:1;text-shadow:0 2px 4px rgba(0,0,0,.5);transform:rotate('+ang+'deg);transform-origin:center center">'+tIcon+'</div>',iconSize:[26,26],iconAnchor:[13,13]});
      const mk=L.marker(mid,{icon:ti,interactive:false}).addTo(m);layRef.current.m.push(mk);
    };

    const drawAll=async()=>{
      if(rt){
        // Main segs: show if filter=ALL or DAS (main route is DAS perspective)
        if(gf==="ALL"||gf==="DAS"||gf==="CV"){
          for(const s of rt.segs)await drawSeg(s,"#E8A838",false);
        }
        // GARK routes
        if(rt.gark&&(gf==="ALL"||gf==="GARK")){
          for(const s of rt.gark)await drawSeg(s,"#3B9B8F",gf==="ALL");
        }
        // CV routes
        if(rt.cv&&(gf==="ALL"||gf==="CV")){
          for(const s of rt.cv)await drawSeg(s,"#C06050",gf==="ALL");
        }
      }

      // Place markers
      const activeIds=rt?[...rt.segs.map(s=>[s.from,s.to]).flat(),...(rt.gark||[]).map(s=>[s.from,s.to]).flat(),...(rt.cv||[]).map(s=>[s.from,s.to]).flat()]:[];
      MAP_PTS.filter(p=>inBZ?p.lat>15&&p.lat<19:true).forEach(p=>{
        const hot=activeIds.includes(p.id);const col=pCol(p.type);const sz=hot?14:10;
        const icon=L.divIcon({className:"",html:'<div style="width:'+sz+'px;height:'+sz+'px;background:'+col+';border:2px solid '+(hot?"#fff":"rgba(255,255,255,.3)")+';border-radius:50%;box-shadow:0 0 '+(hot?8:4)+'px '+col+'"></div>',iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]});
        const mk=L.marker([p.lat,p.lon],{icon}).addTo(m);
        mk.bindPopup('<div class="pin-pop"><strong>'+p.name+'</strong>'+(p.info?'<br/><span style="color:#666">'+p.info+'</span>':'')+'</div>');
        layRef.current.m.push(mk);if(hot)bounds.push([p.lat,p.lon]);
      });

      // Who's where on split days
      if((dy===7||dy===8)&&(gf==="ALL"||gf==="DAS"||gf==="CV")){const ccP=gP("cc");if(ccP){const di=L.divIcon({className:"",html:'<div style="background:rgba(232,168,56,.9);padding:2px 8px;border-radius:10px;font-size:13px;white-space:nowrap">🌸😎🐛🦜</div>',iconSize:[80,24],iconAnchor:[-10,12]});
        const mk=L.marker([ccP.lat,ccP.lon],{icon:di,zIndexOffset:500}).addTo(m);layRef.current.m.push(mk);}}
      if(dy===7&&(gf==="ALL"||gf==="GARK")){const scP=gP("sc");if(scP){const di=L.divIcon({className:"",html:'<div style="background:rgba(59,155,143,.9);padding:2px 8px;border-radius:10px;font-size:13px;white-space:nowrap">🐆🐉🐨🦁</div>',iconSize:[80,24],iconAnchor:[-10,12]});
        const mk=L.marker([scP.lat,scP.lon],{icon:di,zIndexOffset:500}).addTo(m);layRef.current.m.push(mk);}}
      if(dy===8&&(gf==="ALL"||gf==="GARK")){const bP=gP("bze");if(bP){const di=L.divIcon({className:"",html:'<div style="background:rgba(59,155,143,.9);padding:2px 8px;border-radius:10px;font-size:12px;white-space:nowrap">🐆🐉✈️🏠</div>',iconSize:[80,24],iconAnchor:[-10,-10]});
        const mk=L.marker([bP.lat,bP.lon],{icon:di,zIndexOffset:500}).addTo(m);layRef.current.m.push(mk);}}

      // Auto-zoom to fit all routes and POIs
      if(bounds.length>1)m.fitBounds(bounds,{padding:[40,40],maxZoom:inBZ?12:6});
      else if(bounds.length===1)m.setView(bounds[0],inBZ?11:6);
      else if(inBZ)m.setView([17.2,-88.5],8);
    };
    drawAll();
  },[tripDay,sat,groupFilter]);

  return <div style={{position:"relative"}}>
    <div ref={mapRef} style={{height:380,borderRadius:16,overflow:"hidden"}}></div>
    <button onClick={()=>setSat(!sat)} style={{position:"absolute",top:10,right:10,zIndex:1000,background:"rgba(12,34,51,.9)",border:"1px solid rgba(255,255,255,.2)",borderRadius:8,padding:"6px 10px",color:"#E8E4DF",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{sat?"🗺️ Street":"🛰️ Satellite"}</button>
    <div style={{display:"flex",gap:8,justifyContent:"center",marginTop:6,flexWrap:"wrap"}}>
      <span style={{fontSize:9,color:"#E8A838"}}>━ DAS route</span>
      <span style={{fontSize:9,color:"#3B9B8F"}}>┅ GARK</span>
      <span style={{fontSize:9,color:"#C06050"}}>┅ CV</span>
      <span style={{fontSize:9,color:"rgba(123,186,160,.5)"}}>┄ Past</span>
      <span style={{fontSize:9,color:"#FF6B6B"}}>● GPS</span>
    </div>
  </div>;
}

// ─── MAIN ───
function App(){
  const[tab,setTab]=useState(0),[sel,setSel]=useState(Math.max(0,getTD()));
  const[exp,setExp]=useState(INIT_EXP),[showAdd,setShowAdd]=useState(false);
  const[nE,setNE]=useState({item:"",amount:"",paidBy:"CV",cat:"Food & Drinks"});
  const[filt,setFilt]=useState("ALL");
  const[journal,setJournal]=useState([]),[jText,setJText]=useState(""),[jMood,setJMood]=useState("😊");

  useEffect(()=>{(async()=>{
    try{const r=await LS.get("bz7e");if(r)setExp(JSON.parse(r.value))}catch{}
    try{const r=await LS.get("bz7j");if(r)setJournal(JSON.parse(r.value))}catch{}
  })()},[]);
  const sE=u=>{setExp(u);LS.set("bz7e",JSON.stringify(u))};
  const sJ=u=>{setJournal(u);LS.set("bz7j",JSON.stringify(u))};
  const settle=(()=>{const by={DAS:0,GARK:0,CV:0,TBD:0};exp.forEach(e=>{if(by[e.paidBy]!==undefined)by[e.paidBy]+=e.amount});return{total:exp.reduce((s,e)=>s+e.amount,0),by}})();
  const td=getTD(),today=td>=0&&td<DAYS.length?DAYS[td]:null,tLoc=td>=0&&td<DLOC.length?DLOC[td]:null;
  const cs={background:"rgba(255,255,255,.04)",borderRadius:16,padding:16,marginBottom:12,border:"1px solid rgba(255,255,255,.06)"};
  const h3s={fontFamily:"'Playfair Display',serif",fontSize:18,color:"#F4EDE4",marginBottom:8};

  const mIcons=g=>{const gr=TG[g];if(!gr)return null;return<span style={{fontSize:11,marginLeft:4,background:gr.color+"22",padding:"1px 6px",borderRadius:10}}>{gr.icons}</span>};
  const flink=code=>{const f=FLIGHTS.find(x=>x.code===code);return f?<a href={f.url} target="_blank" rel="noopener noreferrer" style={{fontSize:10,background:"rgba(86,180,211,.15)",color:"#56B4D3",padding:"2px 8px",borderRadius:6,textDecoration:"none",fontWeight:700,marginLeft:4}}>Track ↗</a>:null};
  const alink=name=>{const url=ACT_LINKS[name];return url?<a href={url} target="_blank" rel="noopener noreferrer" style={{fontSize:10,background:"rgba(123,186,160,.15)",color:"#7BBAA0",padding:"2px 8px",borderRadius:6,textDecoration:"none",fontWeight:600,marginLeft:4}}>Info ↗</a>:null};

  const renderEv=(ev,i)=><div key={i} style={{display:"flex",gap:10,padding:"9px 12px",borderRadius:12,background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.06)",marginBottom:4}}>
    <div style={{fontSize:15,width:22,textAlign:"center",flexShrink:0}}>{TE[ev.type]}</div>
    <div style={{flex:1}}><div style={{fontSize:13,lineHeight:1.4}}>{ev.desc}{ev.fl&&flink(ev.fl)}{ev.link&&alink(ev.link)}</div>
      <div style={{display:"flex",alignItems:"center",gap:4,marginTop:2,flexWrap:"wrap"}}>
        {ev.time&&<span style={{fontSize:11,color:"#7BBAA0",fontWeight:600}}>{ev.time}</span>}{mIcons(ev.group)}
      </div></div></div>;

  // Accommodation card for a day
  const accomCard=(dayIdx)=>{
    let a=ACCOM[dayIdx];if(!a)return null;if(a.ref!==undefined)a=ACCOM[a.ref];if(!a)return null;
    const photoIdx=a.ref!==undefined?a.ref:dayIdx;
    const photo=typeof ACCOM_PHOTOS!=="undefined"&&ACCOM_PHOTOS[photoIdx]?ACCOM_PHOTOS[photoIdx]:null;
    return<div style={{background:"rgba(255,255,255,.03)",borderRadius:12,padding:10,marginBottom:8,border:"1px solid rgba(255,255,255,.05)"}}>
      {photo&&<img src={photo} alt={a.name} style={{width:"100%",height:100,objectFit:"cover",borderRadius:8,marginBottom:8}} onError={e=>{e.target.style.display="none"}}/>}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{fontSize:13,fontWeight:700}}>🏨 {a.name}</div>
        {a.link&&<a href={a.link} target="_blank" rel="noopener noreferrer" style={{fontSize:10,color:"#56B4D3",textDecoration:"none",fontWeight:600}}>View ↗</a>}
      </div>
      <div style={{fontSize:11,color:"#9BB8A8",marginTop:3}}>{a.am}</div>
      <div style={{display:"flex",gap:12,marginTop:3,fontSize:11}}>
        {a.ci&&<span style={{color:"#7BBAA0"}}>Check-in: {a.ci}</span>}
        {a.co&&<span style={{color:"#7A9B8E"}}>Check-out: {a.co}</span>}
      </div>
      {a.wifi&&<div style={{fontSize:11,color:"#E8A838",marginTop:2}}>📶 WiFi: {a.wifi}</div>}
      {a.addr&&<div style={{fontSize:10,color:"#7A9B8E",marginTop:2}}>📍 {a.addr}</div>}
      {a.note&&<div style={{fontSize:11,color:"#E8A838",marginTop:2}}>{a.note}</div>}
    </div>;
  };

  const packCard=(dayIdx)=>{const p=PACK[dayIdx];if(!p)return null;
    return<div style={{background:"rgba(123,186,160,.08)",borderRadius:10,padding:"6px 10px",marginBottom:8,fontSize:11,color:"#7BBAA0"}}>
      {p.icon} <strong>Don't forget:</strong> {p.tip}
    </div>;
  };

  return <div style={{background:"linear-gradient(160deg,#0C2233 0%,#0A3142 30%,#0E4A3C 70%,#183028 100%)",minHeight:"100vh",color:"#E8E4DF"}}>
    <OfflineBar/>
    {/* Header */}
    <div style={{padding:"24px 20px 8px",textAlign:"center"}}>
      <div style={{fontSize:10,letterSpacing:4,textTransform:"uppercase",color:"#7BBAA0",fontWeight:600}}>April 10 – 20, 2026</div>
      <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:36,fontWeight:700,color:"#F4EDE4",letterSpacing:-1,lineHeight:1}}>Belize</h1>
      <div style={{display:"flex",justifyContent:"center",gap:8,marginTop:10,flexWrap:"wrap"}}>
        {FAMILIES.map(f=><div key={f.code} style={{background:f.color+"18",border:"1px solid "+f.color+"44",borderRadius:12,padding:"6px 12px",textAlign:"center"}}>
          <div style={{fontSize:16,letterSpacing:2}}>{f.members.map(m=>m.icon).join(" ")}</div>
          <div style={{fontSize:9,color:f.color,fontWeight:600,marginTop:2}}>{f.members.map(m=>m.name).join(" · ")}</div>
        </div>)}
      </div>
    </div>

    {/* Tabs */}
    <div style={{display:"flex",padding:"0 6px",marginTop:6,overflowX:"auto"}}>
      {TABS.map((t,i)=><button key={t} onClick={()=>setTab(i)} style={{flex:"none",padding:"9px 12px",fontSize:12,fontWeight:tab===i?700:500,color:tab===i?"#F4EDE4":"#7A9B8E",background:tab===i?"rgba(255,255,255,.08)":"transparent",border:"none",borderBottom:tab===i?"2px solid #E8A838":"2px solid transparent",cursor:"pointer",borderRadius:"8px 8px 0 0"}}>{t}</button>)}
    </div>

    <div style={{padding:"12px 16px 80px"}}>

    {/* TODAY */}
    {tab===0&&<div className="f">{today?<>
      <div style={{background:"linear-gradient(135deg,"+today.color+"30,"+today.color+"08)",borderRadius:16,padding:18,border:"1px solid "+today.color+"44",marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div><div style={{fontSize:10,color:today.color,fontWeight:700,textTransform:"uppercase",letterSpacing:2}}>Day {today.dn} of 11</div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:24,color:"#F4EDE4",marginTop:2}}>{today.title}</div>
            <div style={{fontSize:12,color:"#9BB8A8",marginTop:2}}>📍 {today.loc}</div></div>
          <div style={{fontSize:42}}>{today.icon}</div></div>
        {tLoc&&<Wx loc={tLoc} dayOffset={0}/>}
      </div>
      {packCard(td)}
      {typeof BZ_FACTS!=="undefined"&&<div style={{...cs,background:"rgba(123,186,160,.06)"}}>
        <div style={{fontSize:10,fontWeight:700,color:"#7BBAA0",textTransform:"uppercase",marginBottom:4}}>🇧🇿 Did you know?</div>
        <div style={{fontSize:13,lineHeight:1.5}}>{BZ_FACTS[Math.floor(Math.random()*BZ_FACTS.length)]}</div>
      </div>}
      {accomCard(td)}
      {(()=>{const tf=FLIGHTS.filter(f=>f.day===td);return tf.length?<div style={{...cs,background:"rgba(86,180,211,.06)"}}>
        <div style={{fontSize:10,fontWeight:700,color:"#56B4D3",textTransform:"uppercase",marginBottom:6}}>✈️ Today's Flights</div>
        {tf.map(f=><a key={f.code} href={f.url} target="_blank" rel="noopener noreferrer" style={{display:"flex",justifyContent:"space-between",padding:"8px 10px",background:"rgba(0,0,0,.2)",borderRadius:10,marginBottom:4,textDecoration:"none",color:"#E8E4DF"}}>
          <div><div style={{fontSize:13,fontWeight:700}}>{f.code}</div><div style={{fontSize:11,color:"#9BB8A8"}}>{f.label}</div></div>
          <div style={{fontSize:11,color:"#56B4D3",fontWeight:700}}>Track ↗</div></a>)}
      </div>:null})()}
      <div style={{fontSize:11,fontWeight:700,color:"#7BBAA0",textTransform:"uppercase",marginBottom:6}}>Schedule</div>
      {today.events.map(renderEv)}
      <div style={{...cs,marginTop:8,background:"rgba(232,168,56,.05)"}}>
        <div style={{fontSize:10,fontWeight:700,color:"#E8A838",marginBottom:4}}>🗣️ Kriol of the Day</div>
        {(()=>{const p=KRIOL[td%KRIOL.length];return<>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{fontSize:18,fontWeight:700,fontStyle:"italic",flex:1}}>"{p.k}"</div>
            <button onClick={()=>speakKriol(p.tts)} style={{background:"rgba(232,168,56,.15)",border:"1px solid rgba(232,168,56,.3)",borderRadius:8,padding:"4px 10px",cursor:"pointer",fontSize:14}}>🔊</button>
          </div>
          <div style={{fontSize:13,color:"#9BB8A8",marginTop:2}}>{p.e}</div>
          <div style={{fontSize:9,color:"#7A9B8E",marginTop:1}}>🔊 approximate pronunciation via text-to-speech</div>
        </>})()}
      </div>
      <div style={{...cs,marginTop:4}}>
        <div style={{fontSize:11,fontWeight:700,color:"#7BBAA0",textTransform:"uppercase",marginBottom:6}}>🗺️ Today's Route</div>
        <TripMap tripDay={td}/>
      </div>
    </>:<div style={{...cs,textAlign:"center",padding:32,background:"linear-gradient(135deg,rgba(232,168,56,.12),rgba(123,186,160,.08))"}}>
      <div style={{fontSize:48,marginBottom:8}}>🇧🇿</div>
      {(()=>{const diff=new Date(2026,3,10)-new Date();return diff>0?<><div style={{fontSize:13,color:"#7BBAA0",fontWeight:600}}>TRIP STARTS IN</div><div style={{fontFamily:"'Playfair Display',serif",fontSize:56,fontWeight:700,color:"#E8A838"}}>{Math.ceil(diff/86400000)}</div><div style={{fontSize:14,color:"#9BB8A8"}}>days</div></>:<div style={{fontFamily:"'Playfair Display',serif",fontSize:24}}>Trip Complete!</div>})()}
    </div>}</div>}

    {/* ITINERARY */}
    {tab===1&&<div className="f">
      <div style={{display:"flex",gap:5,overflowX:"auto",paddingBottom:8,marginBottom:10}}>
        {DAYS.map((d,i)=><button key={i} onClick={()=>setSel(i)} style={{flex:"none",padding:"7px 10px",borderRadius:12,background:sel===i?d.color:"rgba(255,255,255,.05)",border:i===td&&sel!==i?"1px solid "+d.color:"1px solid transparent",color:sel===i?"#fff":"#9BB8A8",cursor:"pointer",textAlign:"center",minWidth:52}}>
          <div style={{fontSize:16}}>{d.icon}</div>
          <div style={{fontSize:9,fontWeight:600,marginTop:1}}>{d.date.split(" ")[1]} {d.date.split(" ")[2]}</div>
          {i===td&&<div style={{fontSize:7,color:sel===i?"#FFD":d.color,fontWeight:700}}>TODAY</div>}
        </button>)}
      </div>
      {(()=>{const d=DAYS[sel],lk=sel<DLOC.length?DLOC[sel]:null;const dayOff=td>=0?sel-td:sel;return<div key={sel}>
        <div style={{background:"linear-gradient(135deg,"+d.color+"22,"+d.color+"08)",borderRadius:16,padding:14,border:"1px solid "+d.color+"33",marginBottom:10}}>
          <div style={{fontSize:11,color:d.color,fontWeight:700,textTransform:"uppercase"}}>{d.date} · Day {d.dn}</div>
          <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:22,color:"#F4EDE4",marginTop:2}}>{d.title}</h2>
          <div style={{fontSize:12,color:"#9BB8A8"}}>📍 {d.loc}</div>
          {lk&&dayOff>=0&&dayOff<=13&&<div style={{marginTop:10}}><Wx loc={lk} dayOffset={dayOff}/></div>}
          {lk&&dayOff<0&&<div style={{marginTop:10}}><Wx loc={lk} dayOffset={0} compact/></div>}
        </div>
        {packCard(sel)}
        {accomCard(sel)}
        <div style={{display:"flex",gap:4,marginBottom:8}}>
          {["ALL","DAS","GARK","CV"].map(f=><button key={f} onClick={()=>setFilt(f)} style={{padding:"3px 10px",fontSize:11,borderRadius:8,background:filt===f?"rgba(255,255,255,.12)":"rgba(255,255,255,.04)",border:"none",color:filt===f?"#F4EDE4":"#7A9B8E",cursor:"pointer",fontWeight:filt===f?600:400}}>{f==="ALL"?"All":f}</button>)}
        </div>
        {d.events.filter(e=>filt==="ALL"||e.group==="ALL"||e.group===filt||e.group==="ALL_NO_CV"&&filt!=="CV").map(renderEv)}
        {/* Map for this day at bottom */}
        <div style={{...cs,marginTop:12}}>
          <div style={{fontSize:11,fontWeight:700,color:"#7BBAA0",textTransform:"uppercase",marginBottom:6}}>🗺️ Day {d.dn} Route</div>
          <TripMap tripDay={sel} groupFilter={filt}/>
        </div>
      </div>})()}
    </div>}

    {/* EXPENSES */}
    {tab===2&&<div className="f">
      <div style={{...cs,background:"linear-gradient(135deg,rgba(192,96,80,.12),rgba(123,186,160,.08))"}}>
        <div style={{fontSize:10,fontWeight:700,color:"#C06050",textTransform:"uppercase",marginBottom:4}}>🦜 CV covers everything — for Gita</div>
        <div style={{fontSize:28,fontWeight:700}}>${settle.total.toLocaleString("en",{maximumFractionDigits:0})}</div>
        {(settle.by.DAS>0||settle.by.GARK>0)&&<div style={{marginTop:8,padding:"8px 10px",background:"rgba(0,0,0,.2)",borderRadius:10,fontSize:12}}>
          <div style={{fontWeight:700,color:"#E8A838",marginBottom:4}}>💰 CV Reimbursements:</div>
          {settle.by.DAS>0&&<div>CV → DAS: <strong>${settle.by.DAS.toFixed(2)}</strong></div>}
          {settle.by.GARK>0&&<div>CV → GARK: <strong>${settle.by.GARK.toFixed(2)}</strong></div>}
        </div>}
        {settle.by.TBD>0&&<div style={{fontSize:11,color:"#E8A838",marginTop:6}}>⚠️ ${settle.by.TBD.toFixed(0)} needs payer assigned</div>}
      </div>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
        <div style={{fontSize:13,fontWeight:700}}>All Expenses</div>
        <button onClick={()=>setShowAdd(!showAdd)} style={{background:"#E8A838",color:"#0C2233",border:"none",borderRadius:8,padding:"5px 12px",fontSize:12,fontWeight:700,cursor:"pointer"}}>+ Add</button>
      </div>
      {showAdd&&<div style={{...cs,background:"rgba(255,255,255,.06)"}}>
        <input placeholder="What?" value={nE.item} onChange={e=>setNE({...nE,item:e.target.value})} style={{width:"100%",padding:10,borderRadius:8,border:"1px solid rgba(255,255,255,.15)",background:"rgba(0,0,0,.3)",color:"#E8E4DF",fontSize:13,marginBottom:6}}/>
        <div style={{display:"flex",gap:6,marginBottom:6}}>
          <input type="number" placeholder="$" value={nE.amount} onChange={e=>setNE({...nE,amount:e.target.value})} style={{flex:1,padding:10,borderRadius:8,border:"1px solid rgba(255,255,255,.15)",background:"rgba(0,0,0,.3)",color:"#E8E4DF",fontSize:13}}/>
          <select value={nE.paidBy} onChange={e=>setNE({...nE,paidBy:e.target.value})} style={{flex:1,padding:10,borderRadius:8,border:"1px solid rgba(255,255,255,.15)",background:"rgba(0,0,0,.3)",color:"#E8E4DF",fontSize:13}}>
            <option value="CV">CV</option><option value="DAS">DAS</option><option value="GARK">GARK</option></select>
        </div>
        <button onClick={()=>{if(!nE.item||!nE.amount)return;sE([...exp,{id:Date.now(),...nE,amount:parseFloat(nE.amount)}]);setNE({item:"",amount:"",paidBy:"CV",cat:"Food & Drinks"});setShowAdd(false)}} style={{width:"100%",padding:10,borderRadius:8,background:"#7BBAA0",color:"#0C2233",border:"none",fontSize:13,fontWeight:700,cursor:"pointer"}}>Add</button>
      </div>}
      {["Accommodation","Flights","Activities","Transport","Food & Drinks","Other"].map(cat=>{
        const items=exp.filter(e=>e.cat===cat);if(!items.length)return null;
        return<div key={cat} style={{marginBottom:8}}>
          <div style={{fontSize:10,fontWeight:700,color:"#7BBAA0",textTransform:"uppercase",padding:"6px 0 3px"}}>{cat}</div>
          {items.map(e=><div key={e.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 10px",background:"rgba(255,255,255,.03)",borderRadius:10,marginBottom:2}}>
            <div style={{flex:1,fontSize:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.item}</div>
            <div style={{display:"flex",alignItems:"center",gap:5,flexShrink:0}}>
              <span style={{fontSize:13,fontWeight:700}}>${e.amount.toLocaleString("en",{maximumFractionDigits:2})}</span>
              <select value={e.paidBy} onChange={ev=>sE(exp.map(x=>x.id===e.id?{...x,paidBy:ev.target.value}:x))} style={{padding:"2px 4px",fontSize:10,borderRadius:6,border:"1px solid rgba(255,255,255,.15)",background:e.paidBy==="TBD"?"rgba(232,168,56,.2)":"rgba(0,0,0,.3)",color:e.paidBy==="TBD"?"#E8A838":"#E8E4DF",fontWeight:600}}>
                <option value="CV">CV</option><option value="DAS">DAS</option><option value="GARK">GARK</option><option value="TBD">TBD</option></select>
              <button onClick={()=>sE(exp.filter(x=>x.id!==e.id))} style={{background:"none",border:"none",color:"#7A9B8E",cursor:"pointer",fontSize:14}}>×</button>
            </div></div>)}
        </div>;
      })}
    </div>}

    {/* GUIDE — reordered: Journal, Kriol, Essentials, Restaurants, Contacts, Emergency, Flights, Weather */}
    {tab===3&&<div className="f">
      {/* Journal (top) */}
      <div style={{...cs,background:"rgba(232,168,56,.06)"}}>
        <h3 style={h3s}>📝 Trip Journal</h3>
        <div style={{display:"flex",gap:5,marginBottom:8}}>
          {["😊","🤩","😴","🥰","😎","🌴","🤿","🍽️"].map(m=><button key={m} onClick={()=>setJMood(m)} style={{fontSize:18,background:jMood===m?"rgba(255,255,255,.12)":"transparent",border:jMood===m?"1px solid rgba(255,255,255,.2)":"1px solid transparent",borderRadius:8,padding:"3px 5px",cursor:"pointer"}}>{m}</button>)}</div>
        <textarea value={jText} onChange={e=>setJText(e.target.value)} placeholder="What happened today?" rows={3} style={{width:"100%",padding:10,borderRadius:10,border:"1px solid rgba(255,255,255,.15)",background:"rgba(0,0,0,.3)",color:"#E8E4DF",fontSize:13,resize:"vertical",fontFamily:"inherit",lineHeight:1.5}}/>
        <button onClick={()=>{if(!jText.trim())return;const di=getTD();sJ([{id:Date.now(),text:jText.trim(),mood:jMood,day:di>=0&&di<DAYS.length?DAYS[di].date:"Off-trip",ts:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})},...journal]);setJText("")}} style={{width:"100%",padding:10,borderRadius:8,background:"#E8A838",color:"#0C2233",border:"none",fontSize:13,fontWeight:700,cursor:"pointer",marginTop:6}}>Save Entry</button>
        {journal.map(e=><div key={e.id} style={{...cs,marginTop:8,marginBottom:0}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
            <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:20}}>{e.mood}</span><span style={{fontSize:12,fontWeight:700,color:"#E8A838"}}>{e.day}</span><span style={{fontSize:10,color:"#7A9B8E"}}>{e.ts}</span></div>
            <button onClick={()=>sJ(journal.filter(j=>j.id!==e.id))} style={{background:"none",border:"none",color:"#7A9B8E",cursor:"pointer"}}>×</button></div>
          <div style={{fontSize:13,lineHeight:1.6,whiteSpace:"pre-wrap"}}>{e.text}</div></div>)}
      </div>

      {/* Essentials */}
      <div style={cs}>
        <h3 style={h3s}>🧳 Essentials</h3>
        {ESSENTIALS.map(e=><div key={e.title} style={{display:"flex",gap:10,padding:"6px 0",borderBottom:"1px solid rgba(255,255,255,.04)"}}>
          <div style={{fontSize:16,width:24,textAlign:"center",flexShrink:0}}>{e.icon}</div>
          <div><div style={{fontSize:13,fontWeight:700}}>{e.title}</div><div style={{fontSize:12,color:"#9BB8A8",lineHeight:1.4}}>{e.body}</div></div>
        </div>)}
      </div>

      {/* Kriol with TTS (under Essentials) */}
      <div style={{...cs,background:"rgba(232,168,56,.04)"}}>
        <h3 style={h3s}>🗣️ Kriol Phrasebook</h3>
        <div style={{fontSize:11,color:"#9BB8A8",marginBottom:8}}>Tap 🔊 to hear approximate pronunciation</div>
        {KRIOL.map((p,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid rgba(255,255,255,.04)"}}>
          <div><span style={{fontWeight:700,color:"#E8A838",fontStyle:"italic"}}>{p.k}</span> <span style={{color:"#9BB8A8",marginLeft:6}}>{p.e}</span></div>
          <button onClick={()=>speakKriol(p.tts)} style={{background:"none",border:"none",cursor:"pointer",fontSize:14,padding:2}}>🔊</button>
        </div>)}
      </div>

      {/* Restaurants */}
      <div style={cs}>
        <h3 style={h3s}>🍽️ Restaurants</h3>
        {Object.entries(RESTS).map(([a,ps])=><div key={a} style={{marginBottom:8}}>
          <div style={{fontSize:10,fontWeight:700,color:"#E8A838",textTransform:"uppercase",marginBottom:3}}>{a}</div>
          {ps.map(r=><div key={r.n} style={{padding:"3px 0 3px 10px",borderLeft:"2px solid rgba(232,168,56,.3)"}}><span style={{fontSize:13,fontWeight:600}}>{r.n}</span> <span style={{fontSize:11,color:"#9BB8A8"}}>— {r.d}</span></div>)}
        </div>)}
      </div>

      {/* Contacts */}
      <div style={cs}>
        <h3 style={h3s}>📞 Contacts</h3>
        {CONTACTS.map(c=><div key={c.name} style={{padding:"6px 0",borderBottom:"1px solid rgba(255,255,255,.04)"}}>
          <div style={{fontSize:13,fontWeight:700}}>{c.name}</div>
          <div style={{display:"flex",gap:8,marginTop:2,flexWrap:"wrap"}}>
            {c.phone&&<a href={"tel:"+c.phone.replace(/\s/g,"")} style={{fontSize:11,color:"#7BBAA0",textDecoration:"none"}}>📱 {c.phone}</a>}
            {c.email&&<span style={{fontSize:11,color:"#9BB8A8"}}>✉️ {c.email}</span>}
            {c.wa&&<span style={{fontSize:10,background:"rgba(37,211,102,.15)",color:"#25D366",padding:"1px 6px",borderRadius:4}}>WhatsApp</span>}
          </div></div>)}
      </div>

      {/* Emergency */}
      <div style={{...cs,borderColor:"rgba(192,96,80,.2)"}}>
        <h3 style={h3s}>🚨 Emergency</h3>
        {EMERG.map(e=><div key={e.l} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,.04)"}}>
          <div><div style={{fontSize:12,fontWeight:600}}>{e.l}</div>{e.note&&<div style={{fontSize:10,color:"#7A9B8E"}}>{e.note}</div>}</div>
          <a href={"tel:"+e.n.replace(/\s/g,"")} style={{fontSize:13,fontWeight:700,color:"#7BBAA0",textDecoration:"none"}}>{e.n}</a>
        </div>)}
      </div>

      {/* Flights (bottom) */}
      <div style={cs}>
        <h3 style={h3s}>✈️ All Flights</h3>
        {FLIGHTS.map(f=><a key={f.code} href={f.url} target="_blank" rel="noopener noreferrer" style={{display:"flex",justifyContent:"space-between",padding:"8px 10px",background:"rgba(0,0,0,.15)",borderRadius:10,marginBottom:4,textDecoration:"none",color:"#E8E4DF"}}>
          <div><span style={{fontWeight:700}}>{f.code}</span> <span style={{color:"#9BB8A8"}}>{f.label}</span></div><span style={{color:"#56B4D3",fontWeight:700}}>Track ↗</span></a>)}
      </div>

      {/* Weather (bottom) */}
      <div style={{...cs,background:"linear-gradient(135deg,rgba(232,168,56,.08),rgba(123,186,160,.08))"}}>
        <h3 style={h3s}>☀️ Live Weather</h3>
        {Object.keys(LOCS).map(k=><div key={k} style={{marginBottom:12}}><div style={{fontSize:12,fontWeight:700,color:"#E8A838",marginBottom:4}}>📍 {k}</div><Wx loc={k} compact/></div>)}
      </div>
    </div>}

    </div>
  </div>;
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
