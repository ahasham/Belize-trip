// ─── WEATHER WIDGET ───
function Wx({loc}){
  const[wx,setWx]=useState(null);
  useEffect(()=>{if(!loc||!LOCATIONS[loc])return;const{lat,lon}=LOCATIONS[loc];
    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weathercode&current=temperature_2m,weathercode&timezone=America/Belize&forecast_days=3`)
    .then(r=>r.json()).then(d=>{if(d.daily)setWx(d)}).catch(()=>{});
  },[loc]);
  const ic=c=>{if(c<=1)return"☀️";if(c<=3)return"⛅";if(c<=55)return"🌧️";return"⛈️"};
  if(!wx)return <div style={{fontSize:12,color:"#7A9B8E",padding:4}}>Loading weather...</div>;
  return <div>
    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
      <span style={{fontSize:20}}>{ic(wx.current?.weathercode)}</span>
      <span style={{fontSize:20,fontWeight:700,color:"#E8A838"}}>{Math.round(wx.current?.temperature_2m)}°C</span>
      <span style={{fontSize:10,color:"#7BBAA0",fontWeight:600}}>NOW</span>
      <span style={{fontSize:8,color:"#7A9B8E",marginLeft:"auto"}}>Open-Meteo</span>
    </div>
    <div style={{display:"flex",gap:6}}>
      {wx.daily.time.slice(0,3).map((d,i)=><div key={d} style={{background:"rgba(0,0,0,0.2)",borderRadius:10,padding:"5px 8px",flex:1,textAlign:"center"}}>
        <div style={{fontSize:8,color:"#7BBAA0",fontWeight:600}}>{["TODAY","TMRW","+2"][i]}</div>
        <div style={{fontSize:13}}>{ic(wx.daily.weathercode[i])}</div>
        <div style={{fontSize:12,fontWeight:700,color:"#E8A838"}}>{Math.round(wx.daily.temperature_2m_max[i])}°</div>
        <div style={{fontSize:10,color:"#9BB8A8"}}>{Math.round(wx.daily.temperature_2m_min[i])}°</div>
        <div style={{fontSize:8,color:"#56B4D3"}}>💧{wx.daily.precipitation_probability_max[i]}%</div>
      </div>)}
    </div>
  </div>;
}

// ─── MAP COMPONENT ───
function TripMap({tripDay}){
  const svgRef=useRef(null);
  const[gps,setGps]=useState(null);
  const[selPin,setSelPin]=useState(null);

  useEffect(()=>{
    if(!navigator.geolocation)return;
    const wid=navigator.geolocation.watchPosition(p=>setGps({lat:p.coords.latitude,lon:p.coords.longitude}),()=>{},{enableHighAccuracy:true,maximumAge:30000,timeout:10000});
    return ()=>navigator.geolocation.clearWatch(wid);
  },[]);

  // Belize-focused bounds with room for SEA/DEN/LAX/YYZ
  const bounds={minLat:14.5,maxLat:50,minLon:-125,maxLon:-75};
  const belizeBounds={minLat:15.8,maxLat:18.6,minLon:-89.3,maxLon:-87.3};
  const useBelize=tripDay>=1&&tripDay<=9;
  const b=useBelize?belizeBounds:bounds;

  const project=(lat,lon)=>{
    const x=20+((lon-b.minLon)/(b.maxLon-b.minLon))*360;
    const y=20+((b.maxLat-lat)/(b.maxLat-b.minLat))*280;
    return{x,y};
  };

  const getPoint=id=>MAP_POINTS.find(p=>p.id===id);

  // Which segments to highlight
  const activeRoute=tripDay>=0&&tripDay<DAY_ROUTES.length?DAY_ROUTES[tripDay]:null;
  const pastDays=tripDay>=0?DAY_ROUTES.slice(0,tripDay):[];

  // Determine who's where on split days
  const splitInfo=tripDay>=7&&tripDay<=9;

  return <div style={{position:"relative"}}>
    <svg ref={svgRef} viewBox="0 0 400 320" style={{width:"100%",height:"auto",borderRadius:16,background:"linear-gradient(180deg,#0A2A3C,#0C3545)"}}>
      {/* Past route (dim) */}
      {pastDays.map((dr,di)=>dr.segments.map(([fromId,toId],si)=>{
        const from=getPoint(fromId),to=getPoint(toId);
        if(!from||!to)return null;
        const p1=project(from.lat,from.lon),p2=project(to.lat,to.lon);
        return <line key={`past-${di}-${si}`} x1={p1.x} y1={p1.y} x2={p2.x} y2={p2.y} stroke="rgba(123,186,160,0.15)" strokeWidth={1.5} strokeDasharray="4,4"/>;
      }))}

      {/* Today's route (bright) */}
      {activeRoute&&activeRoute.segments.map(([fromId,toId],si)=>{
        const from=getPoint(fromId),to=getPoint(toId);
        if(!from||!to)return null;
        const p1=project(from.lat,from.lon),p2=project(to.lat,to.lon);
        return <line key={`active-${si}`} x1={p1.x} y1={p1.y} x2={p2.x} y2={p2.y} stroke="#E8A838" strokeWidth={2.5} strokeLinecap="round">
          <animate attributeName="stroke-opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
        </line>;
      })}

      {/* GARK split route */}
      {activeRoute?.garkSegments?.map(([fromId,toId],si)=>{
        const from=getPoint(fromId),to=getPoint(toId);
        if(!from||!to)return null;
        const p1=project(from.lat,from.lon),p2=project(to.lat,to.lon);
        return <line key={`gark-${si}`} x1={p1.x} y1={p1.y} x2={p2.x} y2={p2.y} stroke="#3B9B8F" strokeWidth={2} strokeDasharray="6,3"/>;
      })}

      {/* CV split route */}
      {activeRoute?.cvSegments?.map(([fromId,toId],si)=>{
        const from=getPoint(fromId),to=getPoint(toId);
        if(!from||!to)return null;
        const p1=project(from.lat,from.lon),p2=project(to.lat,to.lon);
        return <line key={`cv-${si}`} x1={p1.x} y1={p1.y} x2={p2.x} y2={p2.y} stroke="#C06050" strokeWidth={2} strokeDasharray="6,3"/>;
      })}

      {/* Location pins */}
      {MAP_POINTS.filter(p=>useBelize?p.lat>15&&p.lat<19:true).map(p=>{
        const pos=project(p.lat,p.lon);
        const isToday=activeRoute&&(activeRoute.segments.flat().includes(p.id)||activeRoute.garkSegments?.flat().includes(p.id)||activeRoute.cvSegments?.flat().includes(p.id));
        const pinColor=p.type==="stay"?"#E8A838":p.type==="activity"?"#7BBAA0":"#56B4D3";
        return <g key={p.id} onClick={()=>setSelPin(selPin===p.id?null:p.id)} style={{cursor:"pointer"}}>

          {isToday&&<circle cx={pos.x} cy={pos.y} r={10} fill="none" stroke={pinColor} strokeWidth={1}><animate attributeName="r" values="7;14;7" dur="2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0;0.8" dur="2s" repeatCount="indefinite"/></circle>}

      {/* Who's where labels on split days */}
      {splitInfo&&tripDay===7&&(()=>{

          <text x={sc.x+12} y={sc.y+4} fill="#3B9B8F" fontSize={10}>🐆🐉🐨🦁</text></>;

      {splitInfo&&tripDay===8&&(()=>{

        return <><text x={cc.x+12} y={cc.y+4} fill="#E8A838" fontSize={10}>🌸😎🐛🦜</text>
          <text x={bze.x+12} y={bze.y-8} fill="#3B9B8F" fontSize={10}>🐆🐉✈️→🏠</text></>;
      })()}
    </svg>

    {/* Legend */}
    <div style={{display:"flex",gap:8,justifyContent:"center",marginTop:6,flexWrap:"wrap"}}>
      <span style={{fontSize:10,color:"#E8A838"}}>● Stay</span>
      <span style={{fontSize:10,color:"#7BBAA0"}}>● Activity</span>
      <span style={{fontSize:10,color:"#56B4D3"}}>● Transit</span>
      {gps&&<span style={{fontSize:10,color:"#FF6B6B"}}>● You</span>}
      <span style={{fontSize:10,color:"#E8A838"}}>━ Today</span>
      <span style={{fontSize:10,color:"rgba(123,186,160,0.5)"}}>┄ Past</span>
    </div>

    {/* Pin detail popup */}
    {selPin&&(()=>{const p=MAP_POINTS.find(x=>x.id===selPin);if(!p)return null;return <div style={{background:"rgba(0,0,0,0.85)",borderRadius:12,padding:12,marginTop:8,border:"1px solid rgba(255,255,255,0.1)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{fontSize:14,fontWeight:700,color:"#F4EDE4"}}>{p.name}</div>
        <button onClick={()=>setSelPin(null)} style={{background:"none",border:"none",color:"#7A9B8E",cursor:"pointer",fontSize:14}}>×</button>
      </div>
      {p.nights&&<div style={{fontSize:11,color:"#7BBAA0",marginTop:2}}>🗓️ {p.nights}</div>}
      {p.info&&<div style={{fontSize:12,color:"#9BB8A8",marginTop:2}}>{p.info}</div>}
      {p.contact&&<div style={{fontSize:11,color:"#E8A838",marginTop:2}}>📞 {p.contact}</div>}
    </div>;})()}
  </div>;
}

          <div style={cs}>
            <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:18,marginBottom:8}}>✈️ All Flights</h3>
            {FLIGHTS.map(f=><a key={f.code} href={f.url} target="_blank" rel="noopener noreferrer" style={{display:"flex",justifyContent:"space-between",padding:"8px 10px",background:"rgba(0,0,0,0.15)",borderRadius:10,marginBottom:4,textDecoration:"none",color:"#E8E4DF"}}>
              <div><span style={{fontWeight:700}}>{f.code}</span> <span style={{color:"#9BB8A8"}}>{f.label}</span><div style={{fontSize:10,color:"#7A9B8E"}}>Day {f.day+1}</div></div>
              <span style={{color:"#56B4D3",fontWeight:700,fontSize:12}}>Track ↗</span>
            </a>)}
          </div>
          <div style={cs}>
            <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:18,marginBottom:8}}>🧳 Essentials</h3>
            {[["💵","Currency","2 BZD = 1 USD. Bring small bills."],["📱","Phone","Amini free. Adam/Diya: Verizon $12/day."],["📶","Villa WiFi","TM6 / angelbaby"],["🔒","Safety","Placencia & Caye Caulker very safe."]].map(([i,t,b])=>
              <div key={t} style={{display:"flex",gap:10,padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
                <div style={{fontSize:16,width:24,textAlign:"center"}}>{i}</div>
                <div><div style={{fontSize:13,fontWeight:700}}>{t}</div><div style={{fontSize:12,color:"#9BB8A8"}}>{b}</div></div>
              </div>)}
          </div>
          <div style={{...cs,borderColor:"rgba(192,96,80,0.2)"}}>
            <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:18,marginBottom:6}}>🚨 Emergency</h3>
            {EMERGENCY.map(e=><div key={e.l} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
              <div><div style={{fontSize:12,fontWeight:600}}>{e.l}</div>{e.note&&<div style={{fontSize:10,color:"#7A9B8E"}}>{e.note}</div>}</div>
              <a href={`tel:${e.n.replace(/\s/g,"")}`} style={{fontSize:13,fontWeight:700,color:"#7BBAA0",textDecoration:"none"}}>{e.n}</a>
            </div>)}
          </div>
          <div style={cs}>
            <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:18,marginBottom:8}}>🍽️ Restaurants</h3>
            {Object.entries(RESTAURANTS).map(([a,ps])=><div key={a} style={{marginBottom:8}}>
              <div style={{fontSize:10,fontWeight:700,color:"#E8A838",textTransform:"uppercase",letterSpacing:1,marginBottom:3}}>{a}</div>
              {ps.map(r=><div key={r.n} style={{padding:"3px 0 3px 10px",borderLeft:"2px solid rgba(232,168,56,0.3)"}}><span style={{fontSize:13,fontWeight:600}}>{r.n}</span> <span style={{fontSize:11,color:"#9BB8A8"}}>— {r.d}</span></div>)}
            </div>)}
          </div>
          <div style={{...cs,background:"rgba(232,168,56,0.04)"}}>
            <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:18,marginBottom:6}}>🗣️ Kriol Phrasebook</h3>
            {KRIOL.map((p,i)=><div key={i} style={{padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
              <span style={{fontWeight:700,color:"#E8A838",fontStyle:"italic"}}>{p.k}</span> <span style={{color:"#9BB8A8",marginLeft:6}}>{p.e}</span>
            </div>)}
          </div>
          <div style={cs}>
            <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:18,marginBottom:8}}>✅ To-Dos</h3>
            {TODOS.map((t,i)=><div key={i} onClick={()=>{const u=new Set(done);u.has(i)?u.delete(i):u.add(i);sT(u)}} style={{display:"flex",gap:10,padding:"7px 0",borderBottom:"1px solid rgba(255,255,255,0.04)",cursor:"pointer",opacity:done.has(i)?0.35:1}}>
              <div style={{width:18,height:18,borderRadius:5,flexShrink:0,border:done.has(i)?"none":`2px solid ${t.urgent?"#E8A838":"#7A9B8E"}`,background:done.has(i)?"#7BBAA0":"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#0C2233"}}>{done.has(i)?"✓":""}</div>
              <div style={{fontSize:13,fontWeight:t.urgent?700:400,textDecoration:done.has(i)?"line-through":"none"}}>{t.urgent?"⚠️ ":""}{t.text}</div>
            </div>)}
          </div>
          <div style={cs}>
            <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:18,marginBottom:8}}>📞 Contacts</h3>
            {CONTACTS.map(c=><div key={c.name} style={{padding:"6px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
              <div style={{fontSize:13,fontWeight:700}}>{c.name}</div>
              {c.phone&&<a href={`tel:${c.phone.replace(/\s/g,"")}`} style={{fontSize:11,color:"#7BBAA0",textDecoration:"none"}}>📱 {c.phone}</a>}
              {c.wa&&<span style={{fontSize:10,background:"rgba(37,211,102,0.15)",color:"#25D366",padding:"1px 6px",borderRadius:4,marginLeft:6}}>WhatsApp</span>}
            </div>)}
          </div>

          {/* Journal at bottom of Guide */}
          <div style={{...cs,background:"rgba(232,168,56,0.06)"}}>
            <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:18,marginBottom:6}}>📝 Trip Journal</h3>
            <div style={{display:"flex",gap:5,marginBottom:8}}>
              {["😊","🤩","😴","🥰","😎","🌴","🤿","🍽️"].map(m=><button key={m} onClick={()=>setJMood(m)} style={{fontSize:18,background:jMood===m?"rgba(255,255,255,0.12)":"transparent",border:jMood===m?"1px solid rgba(255,255,255,0.2)":"1px solid transparent",borderRadius:8,padding:"3px 5px",cursor:"pointer"}}>{m}</button>)}
            </div>
            <textarea value={jText} onChange={e=>setJText(e.target.value)} placeholder="What happened today?" rows={3} style={{width:"100%",padding:10,borderRadius:10,border:"1px solid rgba(255,255,255,0.15)",background:"rgba(0,0,0,0.3)",color:"#E8E4DF",fontSize:13,resize:"vertical",fontFamily:"inherit",lineHeight:1.5}}/>
            <button onClick={addJ} style={{width:"100%",padding:10,borderRadius:8,background:"#E8A838",color:"#0C2233",border:"none",fontSize:13,fontWeight:700,cursor:"pointer",marginTop:6}}>Save Entry</button>
            {journal.map(e=><div key={e.id} style={{...cs,marginTop:8,marginBottom:0}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:20}}>{e.mood}</span><span style={{fontSize:12,fontWeight:700,color:"#E8A838"}}>{e.day}</span><span style={{fontSize:10,color:"#7A9B8E"}}>{e.ts}</span></div>
                <button onClick={()=>sJ(journal.filter(j=>j.id!==e.id))} style={{background:"none",border:"none",color:"#7A9B8E",cursor:"pointer"}}>×</button>
              </div>
              <div style={{fontSize:13,lineHeight:1.6,whiteSpace:"pre-wrap"}}>{e.text}</div>
            </div>)}
          </div>
        </div>}
      </div>
    </div>
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
