// Weather
function Wx({loc}){
  const[wx,setWx]=useState(null);
  useEffect(()=>{if(!loc||!LOCS[loc])return;const{lat,lon}=LOCS[loc];
    fetch("https://api.open-meteo.com/v1/forecast?latitude="+lat+"&longitude="+lon+"&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weathercode&current=temperature_2m,weathercode&timezone=America/Belize&forecast_days=3")
    .then(r=>r.json()).then(d=>{if(d.daily)setWx(d)}).catch(()=>{});
  },[loc]);
  const ic=c=>c<=1?"☀️":c<=3?"⛅":c<=55?"🌧️":"⛈️";
  if(!wx)return <div style={{fontSize:12,color:"#7A9B8E",padding:4}}>Loading weather...</div>;
  return <div>
    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
      <span style={{fontSize:20}}>{ic(wx.current?.weathercode)}</span>
      <span style={{fontSize:20,fontWeight:700,color:"#E8A838"}}>{Math.round(wx.current?.temperature_2m)}°C</span>
      <span style={{fontSize:10,color:"#7BBAA0",fontWeight:600}}>NOW</span>
    </div>
    <div style={{display:"flex",gap:6}}>
      {wx.daily.time.slice(0,3).map((d,i)=><div key={d} style={{background:"rgba(0,0,0,0.2)",borderRadius:10,padding:"5px 8px",flex:1,textAlign:"center"}}>
        <div style={{fontSize:8,color:"#7BBAA0",fontWeight:600}}>{["TODAY","TMRW","+2"][i]}</div>
        <div style={{fontSize:13}}>{ic(wx.daily.weathercode[i])}</div>
        <div style={{fontSize:12,fontWeight:700,color:"#E8A838"}}>{Math.round(wx.daily.temperature_2m_max[i])}°</div>
        <div style={{fontSize:10,color:"#9BB8A8"}}>{Math.round(wx.daily.temperature_2m_min[i])}°</div>
        <div style={{fontSize:8,color:"#56B4D3"}}>💧{wx.daily.precipitation_probability_max[i]}%</div>
      </div>)}
    </div>
  </div>;
}

// Map
function TripMap({tripDay}){
  const[gps,setGps]=useState(null);
  const[pin,setPin]=useState(null);
  useEffect(()=>{if(!navigator.geolocation)return;
    const w=navigator.geolocation.watchPosition(p=>setGps({lat:p.coords.latitude,lon:p.coords.longitude}),()=>{},{enableHighAccuracy:true,maximumAge:30000,timeout:10000});
    return()=>navigator.geolocation.clearWatch(w);
  },[]);
  const inBZ=tripDay>=1&&tripDay<=9;
  const b=inBZ?{mnLa:15.8,mxLa:18.6,mnLo:-89.5,mxLo:-87.3}:{mnLa:14,mxLa:50,mnLo:-126,mxLo:-75};
  const proj=(lat,lon)=>({x:20+((lon-b.mnLo)/(b.mxLo-b.mnLo))*360,y:20+((b.mxLa-lat)/(b.mxLa-b.mnLa))*280});
  const gP=id=>MAP_PTS.find(p=>p.id===id);
  const rt=tripDay>=0&&tripDay<DAY_RT.length?DAY_RT[tripDay]:null;
  const past=tripDay>=0?DAY_RT.slice(0,tripDay):[];

  return <div>
    <svg viewBox="0 0 400 320" style={{width:"100%",borderRadius:16,background:"linear-gradient(180deg,#0A2A3C,#0C3545)"}}>
      {past.map((dr,di)=>dr.segs.map(([a,b],si)=>{const f=gP(a),t=gP(b);if(!f||!t)return null;const p1=proj(f.lat,f.lon),p2=proj(t.lat,t.lon);
        return <line key={"p"+di+si} x1={p1.x} y1={p1.y} x2={p2.x} y2={p2.y} stroke="rgba(123,186,160,0.15)" strokeWidth={1.5} strokeDasharray="4,4"/>;
      }))}
      {rt&&rt.segs.map(([a,b],si)=>{const f=gP(a),t=gP(b);if(!f||!t)return null;const p1=proj(f.lat,f.lon),p2=proj(t.lat,t.lon);
        return <line key={"a"+si} x1={p1.x} y1={p1.y} x2={p2.x} y2={p2.y} stroke="#E8A838" strokeWidth={2.5}><animate attributeName="stroke-opacity" values="1;.5;1" dur="2s" repeatCount="indefinite"/></line>;
      })}
      {rt&&rt.gark&&rt.gark.map(([a,b],si)=>{const f=gP(a),t=gP(b);if(!f||!t)return null;const p1=proj(f.lat,f.lon),p2=proj(t.lat,t.lon);
        return <line key={"g"+si} x1={p1.x} y1={p1.y} x2={p2.x} y2={p2.y} stroke="#3B9B8F" strokeWidth={2} strokeDasharray="6,3"/>;
      })}
      {rt&&rt.cv&&rt.cv.map(([a,b],si)=>{const f=gP(a),t=gP(b);if(!f||!t)return null;const p1=proj(f.lat,f.lon),p2=proj(t.lat,t.lon);
        return <line key={"c"+si} x1={p1.x} y1={p1.y} x2={p2.x} y2={p2.y} stroke="#C06050" strokeWidth={2} strokeDasharray="6,3"/>;
      })}
      {MAP_PTS.filter(p=>inBZ?p.lat>15&&p.lat<19:true).map(p=>{
        const pos=proj(p.lat,p.lon);
        const hot=rt&&(rt.segs.flat().includes(p.id)||rt.gark?.flat().includes(p.id)||rt.cv?.flat().includes(p.id));
        const col=p.type==="stay"?"#E8A838":p.type==="activity"?"#7BBAA0":"#56B4D3";
        return <g key={p.id} onClick={()=>setPin(pin===p.id?null:p.id)} style={{cursor:"pointer"}}>
          <circle cx={pos.x} cy={pos.y} r={hot?7:5} fill={col} opacity={hot?1:.6} stroke={hot?"#fff":"none"} strokeWidth={hot?1.5:0}/>
          {hot&&<circle cx={pos.x} cy={pos.y} r={10} fill="none" stroke={col} strokeWidth={1}><animate attributeName="r" values="7;14;7" dur="2s" repeatCount="indefinite"/><animate attributeName="opacity" values=".8;0;.8" dur="2s" repeatCount="indefinite"/></circle>}
          <text x={pos.x} y={pos.y-10} textAnchor="middle" fill="#E8E4DF" fontSize={inBZ?9:7} fontWeight={hot?700:400}>{p.name}</text>
        </g>;
      })}
      {tripDay===7&&(()=>{const a=proj(17.75,-88.02),b=proj(17.53,-88.30);return<><text x={a.x+14} y={a.y+4} fill="#E8A838" fontSize={10}>🌸😎🐛🦜</text><text x={b.x+14} y={b.y+4} fill="#3B9B8F" fontSize={10}>🐆🐉🐨🦁</text></>})()}
      {tripDay===8&&(()=>{const a=proj(17.75,-88.02),b=proj(17.54,-88.31);return<><text x={a.x+14} y={a.y+4} fill="#E8A838" fontSize={10}>🌸😎🐛🦜</text><text x={b.x+14} y={b.y-8} fill="#3B9B8F" fontSize={9}>🐆🐉✈️🏠</text></>})()}
      {gps&&(()=>{const p=proj(gps.lat,gps.lon);return<g>
        <circle cx={p.x} cy={p.y} r={6} fill="#FF6B6B" stroke="#fff" strokeWidth={2}/>

      </div>
      <div style={{...cs,background:"rgba(232,168,56,.06)"}}>
        <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:18,marginBottom:6}}>📝 Journal</h3>
        <div style={{display:"flex",gap:5,marginBottom:8}}>
          {["😊","🤩","😴","🥰","😎","🌴","🤿","🍽️"].map(m=><button key={m} onClick={()=>setJMood(m)} style={{fontSize:18,background:jMood===m?"rgba(255,255,255,.12)":"transparent",border:jMood===m?"1px solid rgba(255,255,255,.2)":"1px solid transparent",borderRadius:8,padding:"3px 5px",cursor:"pointer"}}>{m}</button>)}
        </div>
        <textarea value={jText} onChange={e=>setJText(e.target.value)} placeholder="What happened today?" rows={3} style={{width:"100%",padding:10,borderRadius:10,border:"1px solid rgba(255,255,255,.15)",background:"rgba(0,0,0,.3)",color:"#E8E4DF",fontSize:13,resize:"vertical",fontFamily:"inherit",lineHeight:1.5}}/>
        <button onClick={()=>{if(!jText.trim())return;const di=getTD();sJ([{id:Date.now(),text:jText.trim(),mood:jMood,day:di>=0&&di<DAYS.length?DAYS[di].date:"Off-trip",ts:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})},...journal]);setJText("")}} style={{width:"100%",padding:10,borderRadius:8,background:"#E8A838",color:"#0C2233",border:"none",fontSize:13,fontWeight:700,cursor:"pointer",marginTop:6}}>Save Entry</button>
        {journal.map(e=><div key={e.id} style={{...cs,marginTop:8,marginBottom:0}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
            <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:20}}>{e.mood}</span><span style={{fontSize:12,fontWeight:700,color:"#E8A838"}}>{e.day}</span><span style={{fontSize:10,color:"#7A9B8E"}}>{e.ts}</span></div>
            <button onClick={()=>sJ(journal.filter(j=>j.id!==e.id))} style={{background:"none",border:"none",color:"#7A9B8E",cursor:"pointer"}}>×</button>
          </div>
          <div style={{fontSize:13,lineHeight:1.6,whiteSpace:"pre-wrap"}}>{e.text}</div>
        </div>)}
      </div>
    </div>}

    </div>
  </div>;
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
