function Wx({loc}){
  const[wx,setWx]=useState(null);
  useEffect(()=>{if(!loc||!LOCS[loc])return;const{lat,lon}=LOCS[loc];
    fetch("https://api.open-meteo.com/v1/forecast?latitude="+lat+"&longitude="+lon+"&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weathercode&current=temperature_2m,weathercode&timezone=America/Belize&forecast_days=3")
    .then(r=>r.json()).then(d=>{if(d.daily)setWx(d)}).catch(()=>{});
  },[loc]);
  const ic=c=>c<=1?"☀️":c<=3?"⛅":c<=55?"🌧️":"⛈️";
  if(!wx)return <div style={{fontSize:12,color:"#7A9B8E",padding:4}}>Loading weather...</div>;
  return <div>
    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
      <span style={{fontSize:20}}>{ic(wx.current?.weathercode)}</span>
      <span style={{fontSize:20,fontWeight:700,color:"#E8A838"}}>{Math.round(wx.current?.temperature_2m)}°C</span>
      <span style={{fontSize:10,color:"#7BBAA0",fontWeight:600}}>NOW</span>
    </div>
    <div style={{display:"flex",gap:6}}>
      {wx.daily.time.slice(0,3).map((d,i)=><div key={d} style={{background:"rgba(0,0,0,.2)",borderRadius:10,padding:"5px 8px",flex:1,textAlign:"center"}}>
        <div style={{fontSize:8,color:"#7BBAA0",fontWeight:600}}>{["TODAY","TMRW","+2"][i]}</div>
        <div style={{fontSize:13}}>{ic(wx.daily.weathercode[i])}</div>
        <div style={{fontSize:12,fontWeight:700,color:"#E8A838"}}>{Math.round(wx.daily.temperature_2m_max[i])}°</div>
        <div style={{fontSize:10,color:"#9BB8A8"}}>{Math.round(wx.daily.temperature_2m_min[i])}°</div>
        <div style={{fontSize:8,color:"#56B4D3"}}>💧{wx.daily.precipitation_probability_max[i]}%</div>
      </div>)}
    </div>
  </div>;
}

// ─── LEAFLET MAP ───
function TripMap({tripDay}){
  const mapRef=useRef(null);
  const mapInst=useRef(null);
  const layersRef=useRef({routes:[],markers:[],gps:null});
  const[sat,setSat]=useState(false);
  const[mapDay,setMapDay]=useState(tripDay>=0?tripDay:1);
  const tilesRef=useRef(null);

  const gP=id=>MAP_PTS.find(p=>p.id===id);
  const pinColor=t=>t==="stay"?"#E8A838":t==="activity"?"#7BBAA0":"#56B4D3";

  useEffect(()=>{
    if(mapInst.current||!mapRef.current)return;
    const inBZ=mapDay>=1&&mapDay<=9;
    const map=L.map(mapRef.current,{zoomControl:false,attributionControl:false}).setView(inBZ?[17.2,-88.5]:[30,-95],inBZ?8:4);
    L.control.zoom({position:"bottomright"}).addTo(map);
    tilesRef.current=L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:18}).addTo(map);
    mapInst.current=map;

    // GPS
    if(navigator.geolocation){
      navigator.geolocation.watchPosition(p=>{
        const ll=[p.coords.latitude,p.coords.longitude];
        if(layersRef.current.gps){layersRef.current.gps.setLatLng(ll)}
        else{
          const gpsIcon=L.divIcon({className:"",html:'<div style="position:relative"><div class="gps-pulse"></div><div style="position:absolute;top:4px;left:4px;width:12px;height:12px;background:#FF6B6B;border:2px solid #fff;border-radius:50%"></div></div>',iconSize:[20,20],iconAnchor:[10,10]});
          layersRef.current.gps=L.marker(ll,{icon:gpsIcon,zIndexOffset:1000}).addTo(map);
          layersRef.current.gps.bindTooltip("📍 You",{className:"pin-label",direction:"top",offset:[0,-12]});
        }
      },()=>{},{enableHighAccuracy:true,maximumAge:30000,timeout:10000});
    }
    return()=>{};
  },[]);

  // Toggle tiles
  useEffect(()=>{
    if(!mapInst.current||!tilesRef.current)return;
    mapInst.current.removeLayer(tilesRef.current);
    tilesRef.current=L.tileLayer(sat
      ?"https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"
      :"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:18}).addTo(mapInst.current);
  },[sat]);

  // Update routes & markers when day changes
  useEffect(()=>{
    if(!mapInst.current)return;
    const map=mapInst.current;
    // Clear old
    layersRef.current.routes.forEach(l=>map.removeLayer(l));
    layersRef.current.markers.forEach(l=>map.removeLayer(l));
    layersRef.current.routes=[];
    layersRef.current.markers=[];

    const inBZ=mapDay>=1&&mapDay<=9;
    const rt=mapDay>=0&&mapDay<DAY_RT.length?DAY_RT[mapDay]:null;
    const past=DAY_RT.slice(0,mapDay);
    const bounds=[];

    // Past routes
    past.forEach(dr=>{
      dr.segs.forEach(([a,b])=>{
        const f=gP(a),t=gP(b);if(!f||!t)return;
        const line=L.polyline([[f.lat,f.lon],[t.lat,t.lon]],{color:"rgba(123,186,160,0.3)",weight:2,dashArray:"6,4"}).addTo(map);
        layersRef.current.routes.push(line);
      });
    });

    // Today routes
    if(rt){
      rt.segs.forEach(([a,b])=>{
        const f=gP(a),t=gP(b);if(!f||!t)return;
        bounds.push([f.lat,f.lon],[t.lat,t.lon]);
        const line=L.polyline([[f.lat,f.lon],[t.lat,t.lon]],{color:"#E8A838",weight:3.5,opacity:0.9}).addTo(map);
        layersRef.current.routes.push(line);
      });
      if(rt.gark)rt.gark.forEach(([a,b])=>{
        const f=gP(a),t=gP(b);if(!f||!t)return;
        bounds.push([f.lat,f.lon],[t.lat,t.lon]);
        const line=L.polyline([[f.lat,f.lon],[t.lat,t.lon]],{color:"#3B9B8F",weight:2.5,dashArray:"8,4"}).addTo(map);
        layersRef.current.routes.push(line);
      });
      if(rt.cv)rt.cv.forEach(([a,b])=>{
        const f=gP(a),t=gP(b);if(!f||!t)return;
        bounds.push([f.lat,f.lon],[t.lat,t.lon]);
        const line=L.polyline([[f.lat,f.lon],[t.lat,t.lon]],{color:"#C06050",weight:2.5,dashArray:"8,4"}).addTo(map);
        layersRef.current.routes.push(line);
      });
    }

    // Pins
    const activeIds=rt?[...rt.segs.flat(),...(rt.gark||[]).flat(),...(rt.cv||[]).flat()]:[];
    MAP_PTS.filter(p=>inBZ?p.lat>15&&p.lat<19:true).forEach(p=>{
      const isActive=activeIds.includes(p.id);
      const col=pinColor(p.type);
      const sz=isActive?14:10;
      const icon=L.divIcon({className:"",html:'<div style="width:'+sz+'px;height:'+sz+'px;background:'+col+';border:2px solid '+(isActive?"#fff":"rgba(255,255,255,0.3)")+';border-radius:50%;box-shadow:0 0 '+(isActive?8:4)+'px '+col+'"></div>',iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]});
      const m=L.marker([p.lat,p.lon],{icon}).addTo(map);
      const tooltip=p.name+(p.info?" — "+p.info:"");
      m.bindPopup('<div style="font-family:Instrument Sans,sans-serif;font-size:13px"><strong>'+p.name+'</strong>'+(p.info?'<br/><span style="color:#666">'+p.info+'</span>':'')+'</div>');
      m.bindTooltip(p.name,{className:"pin-label",direction:"top",offset:[0,-8]});
      layersRef.current.markers.push(m);
      if(isActive)bounds.push([p.lat,p.lon]);
    });

    // Who's where labels on split days
    if(mapDay===7||mapDay===8){
      const ccPt=gP("cc"),scPt=gP("sc");
      if(ccPt){
        const dasIcon=L.divIcon({className:"",html:'<div style="background:rgba(232,168,56,0.9);padding:2px 8px;border-radius:10px;font-size:14px;white-space:nowrap">🌸😎🐛🦜</div>',iconSize:[80,24],iconAnchor:[-10,12]});
        const m=L.marker([ccPt.lat,ccPt.lon],{icon:dasIcon,zIndexOffset:500}).addTo(map);
        layersRef.current.markers.push(m);
      }
      if(scPt&&mapDay===7){
        const garkIcon=L.divIcon({className:"",html:'<div style="background:rgba(59,155,143,0.9);padding:2px 8px;border-radius:10px;font-size:14px;white-space:nowrap">🐆🐉🐨🦁</div>',iconSize:[80,24],iconAnchor:[-10,12]});
        const m=L.marker([scPt.lat,scPt.lon],{icon:garkIcon,zIndexOffset:500}).addTo(map);
        layersRef.current.markers.push(m);
      }
      if(mapDay===8){
        const bzeP=gP("bze");
        if(bzeP){const gi=L.divIcon({className:"",html:'<div style="background:rgba(59,155,143,0.9);padding:2px 8px;border-radius:10px;font-size:12px;white-space:nowrap">🐆🐉✈️🏠</div>',iconSize:[80,24],iconAnchor:[-10,-10]});
        const m=L.marker([bzeP.lat,bzeP.lon],{icon:gi,zIndexOffset:500}).addTo(map);layersRef.current.markers.push(m);}
      }
    }

    // Fit bounds
    if(bounds.length>1)map.fitBounds(bounds,{padding:[40,40],maxZoom:inBZ?10:6});
    else if(bounds.length===1)map.setView(bounds[0],inBZ?10:6);
    else map.setView(inBZ?[17.2,-88.5]:[30,-95],inBZ?8:4);
  },[mapDay]);

  return <div style={{position:"relative"}}>
    <div ref={mapRef} style={{height:380,borderRadius:16,overflow:"hidden"}}></div>
    <button className="map-toggle" onClick={()=>setSat(!sat)}>{sat?"🗺️ Street":"🛰️ Satellite"}</button>
    <div className="day-chip">
      {DAYS.map((d,i)=><button key={i} onClick={()=>setMapDay(i)} style={{background:mapDay===i?d.color:"rgba(12,34,51,0.85)",color:mapDay===i?"#fff":"#9BB8A8"}}>{d.date.split(" ")[2]}</button>)}
    </div>
    <div style={{display:"flex",gap:8,justifyContent:"center",marginTop:8,flexWrap:"wrap"}}>
      <span style={{fontSize:9,color:"#E8A838"}}>━ Today's route</span>
      <span style={{fontSize:9,color:"#3B9B8F"}}>┅ GARK</span>
      <span style={{fontSize:9,color:"#C06050"}}>┅ CV</span>
      <span style={{fontSize:9,color:"rgba(123,186,160,0.5)"}}>┄ Past</span>
    </div>
  </div>;
}

          {ps.map(r=><div key={r.n} style={{padding:"3px 0 3px 10px",borderLeft:"2px solid rgba(232,168,56,.3)"}}><span style={{fontSize:13,fontWeight:600}}>{r.n}</span> <span style={{fontSize:11,color:"#9BB8A8"}}>— {r.d}</span></div>)}</div>)}
      </div>
      <div style={{...cs,background:"rgba(232,168,56,.04)"}}><h3 style={{fontFamily:"'Playfair Display',serif",fontSize:18,marginBottom:6}}>🗣️ Kriol</h3>
        {KRIOL.map((p,i)=><div key={i} style={{padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,.04)"}}><span style={{fontWeight:700,color:"#E8A838",fontStyle:"italic"}}>{p.k}</span> <span style={{color:"#9BB8A8",marginLeft:6}}>{p.e}</span></div>)}
      </div>
      <div style={cs}><h3 style={{fontFamily:"'Playfair Display',serif",fontSize:18,marginBottom:8}}>✅ To-Dos</h3>
        {TODOS.map((t,i)=><div key={i} onClick={()=>{const u=new Set(done);u.has(i)?u.delete(i):u.add(i);sT(u)}} style={{display:"flex",gap:10,padding:"7px 0",borderBottom:"1px solid rgba(255,255,255,.04)",cursor:"pointer",opacity:done.has(i)?.35:1}}>
          <div style={{width:18,height:18,borderRadius:5,flexShrink:0,border:done.has(i)?"none":"2px solid "+(t.urgent?"#E8A838":"#7A9B8E"),background:done.has(i)?"#7BBAA0":"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#0C2233"}}>{done.has(i)?"✓":""}</div>
          <div style={{fontSize:13,fontWeight:t.urgent?700:400,textDecoration:done.has(i)?"line-through":"none"}}>{t.urgent?"⚠️ ":""}{t.text}</div></div>)}
      </div>
      <div style={cs}><h3 style={{fontFamily:"'Playfair Display',serif",fontSize:18,marginBottom:8}}>📞 Contacts</h3>
        {CONTACTS.map(c=><div key={c.name} style={{padding:"6px 0",borderBottom:"1px solid rgba(255,255,255,.04)"}}>
          <div style={{fontSize:13,fontWeight:700}}>{c.name}</div>
          {c.phone&&<a href={"tel:"+c.phone.replace(/\s/g,"")} style={{fontSize:11,color:"#7BBAA0",textDecoration:"none"}}>📱 {c.phone}</a>}
          {c.wa&&<span style={{fontSize:10,background:"rgba(37,211,102,.15)",color:"#25D366",padding:"1px 6px",borderRadius:4,marginLeft:6}}>WhatsApp</span>}</div>)}
      </div>
      <div style={{...cs,background:"rgba(232,168,56,.06)"}}><h3 style={{fontFamily:"'Playfair Display',serif",fontSize:18,marginBottom:6}}>📝 Journal</h3>
        <div style={{display:"flex",gap:5,marginBottom:8}}>
          {["😊","🤩","😴","🥰","😎","🌴","🤿","🍽️"].map(m=><button key={m} onClick={()=>setJMood(m)} style={{fontSize:18,background:jMood===m?"rgba(255,255,255,.12)":"transparent",border:jMood===m?"1px solid rgba(255,255,255,.2)":"1px solid transparent",borderRadius:8,padding:"3px 5px",cursor:"pointer"}}>{m}</button>)}</div>
        <textarea value={jText} onChange={e=>setJText(e.target.value)} placeholder="What happened today?" rows={3} style={{width:"100%",padding:10,borderRadius:10,border:"1px solid rgba(255,255,255,.15)",background:"rgba(0,0,0,.3)",color:"#E8E4DF",fontSize:13,resize:"vertical",fontFamily:"inherit",lineHeight:1.5}}/>
        <button onClick={()=>{if(!jText.trim())return;const di=getTD();sJ([{id:Date.now(),text:jText.trim(),mood:jMood,day:di>=0&&di<DAYS.length?DAYS[di].date:"Off-trip",ts:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})},...journal]);setJText("")}} style={{width:"100%",padding:10,borderRadius:8,background:"#E8A838",color:"#0C2233",border:"none",fontSize:13,fontWeight:700,cursor:"pointer",marginTop:6}}>Save Entry</button>
        {journal.map(e=><div key={e.id} style={{...cs,marginTop:8,marginBottom:0}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
            <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:20}}>{e.mood}</span><span style={{fontSize:12,fontWeight:700,color:"#E8A838"}}>{e.day}</span><span style={{fontSize:10,color:"#7A9B8E"}}>{e.ts}</span></div>
            <button onClick={()=>sJ(journal.filter(j=>j.id!==e.id))} style={{background:"none",border:"none",color:"#7A9B8E",cursor:"pointer"}}>×</button></div>
          <div style={{fontSize:13,lineHeight:1.6,whiteSpace:"pre-wrap"}}>{e.text}</div></div>)}
      </div>
    </div>}

    </div>
  </div>;
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
