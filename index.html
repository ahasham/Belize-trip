<script type="text/babel">
const {useState,useEffect,useRef,useMemo}=React;

// ─── CONSTANTS ───
const LS_EXP="bz7e", LS_PERSONA="bz7p";
const LS_JRN_LEGACY="bz7j"; // pre-persona single journal — migrated on first persona pick
const JRN_KEY=p=>`bz7j:${p}`;
const WILD_KEY=p=>`bz7w:${p}`;
const TRIP_START=new Date(2026,3,10);
const TE={flight:"✈️",transport:"🚐",hotel:"🏨",food:"🍽️",activity:"⭐"};
const TRANSPORT_ICON={fly:"✈️",boat:"⛵",drive:"🚐"};
const MOODS=["😊","🤩","😴","🥰","😎","🌴","🤿","🍽️"];
const EXP_CATS=["Accommodation","Flights","Activities","Transport","Food & Drinks","Other"];
const PAYER_OPTIONS=["CV","DAS","GARK"];
const PAYER_OPTIONS_WITH_TBD=["CV","DAS","GARK","TBD"];
const GROUP_FILTERS=["ALL","DAS","GARK","CV"];
const KID_PERSONAS=new Set(["Shaan","Reyan","Kamrin"]);
const PERSONA_GROUP={
  Adam:"DAS", Diya:"DAS", Shaan:"DAS",
  Amini:"GARK", Gautam:"GARK", Reyan:"GARK", Kamrin:"GARK",
  CV:"CV",
};
// Does an event belong to this persona's lived experience? (ALL always does)
function eventMatchesPersona(ev,persona){
  if(!persona) return true;
  if(ev.group==="ALL") return true;
  const g=PERSONA_GROUP[persona];
  if(ev.group==="ALL_NO_CV") return g!=="CV";
  return ev.group===g;
}

// ─── HELPERS ───
const LS={
  get:k=>{try{return localStorage.getItem(k)}catch{return null}},
  set:(k,v)=>{try{localStorage.setItem(k,v)}catch{}},
};
const loadJSON=(key,fallback)=>{
  const v=LS.get(key);if(!v)return fallback;
  try{return JSON.parse(v)}catch{return fallback}
};
// getTD: index into DAYS for "today" during the trip window, else -1
function getTD(){
  const d=new Date();
  if(d.getMonth()===3 && d.getDate()>=10 && d.getDate()<=20) return d.getDate()-10;
  return -1;
}
function speakKriol(text){
  if(!window.speechSynthesis) return;
  const u=new SpeechSynthesisUtterance(text);
  u.rate=0.85; u.pitch=1.1;
  window.speechSynthesis.speak(u);
}
const fmtMoney=(n,d=2)=>"$"+n.toLocaleString("en",{minimumFractionDigits:d,maximumFractionDigits:d});

// ─── PERSONA ───
function usePersona(){
  const[persona,setPersonaState]=useState(()=>LS.get(LS_PERSONA));
  const pick=name=>{
    // One-time migration: if legacy shared journal exists and this persona has no journal yet, inherit it
    const legacy=LS.get(LS_JRN_LEGACY);
    if(legacy && !LS.get(JRN_KEY(name))){
      LS.set(JRN_KEY(name),legacy);
      try{localStorage.removeItem(LS_JRN_LEGACY)}catch{}
    }
    LS.set(LS_PERSONA,name);
    setPersonaState(name);
  };
  return[persona,pick];
}

// ─── PER-PERSONA STORAGE HOOKS ───
function useJournal(persona){
  const key=JRN_KEY(persona);
  const[j,setJState]=useState(()=>loadJSON(key,[]));
  useEffect(()=>{setJState(loadJSON(key,[]))},[key]);
  const save=next=>{setJState(next); LS.set(key,JSON.stringify(next))};
  return[j,save];
}
function useWildlife(persona){
  const key=WILD_KEY(persona);
  const[spotted,setSpottedState]=useState(()=>new Set(loadJSON(key,[])));
  useEffect(()=>{setSpottedState(new Set(loadJSON(key,[])))},[key]);
  const toggle=name=>{
    const next=new Set(spotted);
    if(next.has(name)) next.delete(name); else next.add(name);
    setSpottedState(next);
    LS.set(key,JSON.stringify([...next]));
  };
  return[spotted,toggle];
}

// ─── STYLE TOKENS ───
const S={
  card:{background:"rgba(255,255,255,.04)",borderRadius:16,padding:16,marginBottom:12,border:"1px solid rgba(255,255,255,.06)"},
  h3:{fontFamily:"'Playfair Display',serif",fontSize:18,color:"#F4EDE4",marginBottom:8},
  caption:{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:1},
  input:{padding:10,borderRadius:8,border:"1px solid rgba(255,255,255,.15)",background:"rgba(0,0,0,.3)",color:"#E8E4DF",fontSize:13},
  primaryBtn:{background:"#E8A838",color:"#0C2233",border:"none",borderRadius:8,padding:"5px 12px",fontSize:12,fontWeight:700,cursor:"pointer"},
  rowDivider:{borderBottom:"1px solid rgba(255,255,255,.04)"},
};
const tintCard=bg=>({...S.card,background:bg});

// ─── UI PRIMITIVES ───
const FamilyChip=({group})=>{
  const g=TG[group]; if(!g) return null;
  return <span style={{fontSize:11,marginLeft:4,background:g.color+"22",padding:"1px 6px",borderRadius:10}}>{g.icons}</span>;
};
const TrackLink=({code})=>{

  return <a href={f.url} target="_blank" rel="noopener noreferrer" style={{fontSize:10,background:"rgba(86,180,211,.15)",color:"#56B4D3",padding:"2px 8px",borderRadius:6,textDecoration:"none",fontWeight:700,marginLeft:4}}>Track ↗</a>;
};
const InfoLink=({name})=>{
  const url=ACT_LINKS[name]; if(!url) return null;
  return <a href={url} target="_blank" rel="noopener noreferrer" style={{fontSize:10,background:"rgba(123,186,160,.15)",color:"#7BBAA0",padding:"2px 8px",borderRadius:6,textDecoration:"none",fontWeight:600,marginLeft:4}}>Info ↗</a>;

// ─── WELCOME SCREEN & PERSONA CHIP ───
function PersonaPicker({currentPersona,onPick,onClose}){
  const members=FAMILIES.flatMap(f=>f.members.map(m=>({...m,group:f.code,color:f.color})));
  return <div style={{position:"fixed",inset:0,zIndex:10000,background:"rgba(12,34,51,.96)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20,overflow:"auto"}}>
    <div style={{...S.caption,letterSpacing:4,color:"#7BBAA0"}}>Belize 2026</div>
    <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:32,fontWeight:700,color:"#F4EDE4",letterSpacing:-1,marginTop:6,marginBottom:4}}>Who's using this?</h1>
    <div style={{fontSize:12,color:"#9BB8A8",marginBottom:20}}>Tap your face. Saved to this device.</div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(2, minmax(0, 1fr))",gap:10,width:"100%",maxWidth:360}}>
      {members.map(m=>{
        const selected=m.name===currentPersona;
        return <button key={m.name} onClick={()=>onPick(m.name)} style={{padding:"14px 8px",borderRadius:14,background:selected?m.color+"30":"rgba(255,255,255,.04)",border:`1px solid ${selected?m.color:"rgba(255,255,255,.1)"}`,color:"#E8E4DF",cursor:"pointer",textAlign:"center",fontFamily:"inherit"}}>
          <div style={{fontSize:36,lineHeight:1}}>{m.icon}</div>
          <div style={{fontSize:14,fontWeight:700,marginTop:6}}>{m.name}</div>
          <div style={{fontSize:9,color:m.color,fontWeight:600,marginTop:2,letterSpacing:1}}>{m.group}</div>
        </button>;
      })}
    </div>
    {onClose && <button onClick={onClose} style={{marginTop:16,background:"none",border:"1px solid rgba(255,255,255,.2)",color:"#9BB8A8",borderRadius:8,padding:"6px 14px",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>Cancel</button>}
  </div>;
}

function PersonaChip({persona,onChange}){
  const[open,setOpen]=useState(false);
  return <>
    <button onClick={()=>setOpen(true)} style={{background:"rgba(255,255,255,.08)",border:"1px solid rgba(255,255,255,.15)",color:"#E8E4DF",borderRadius:20,padding:"4px 10px",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit",display:"inline-flex",alignItems:"center",gap:4}}>
      <span style={{fontSize:14}}>{MEMBERS[persona]}</span>
      <span>Viewing as {persona}</span>
      <span style={{fontSize:9,opacity:.6}}>▾</span>
    </button>
    {open && <PersonaPicker currentPersona={persona} onPick={name=>{onChange(name);setOpen(false)}} onClose={()=>setOpen(false)}/>}
  </>;
}

// ─── OFFLINE BAR ───
function OfflineBar(){
  const[online,setOnline]=useState(navigator.onLine);
  useEffect(()=>{
    const on=()=>setOnline(true), off=()=>setOnline(false);
    window.addEventListener("online",on); window.addEventListener("offline",off);
    return()=>{window.removeEventListener("online",on); window.removeEventListener("offline",off)};
  },[]);
  if(online) return null;
  return <div style={{background:"#C06050",color:"#fff",textAlign:"center",padding:"6px 12px",fontSize:12,fontWeight:700,position:"fixed",top:0,left:0,right:0,zIndex:9999}}>📡 You're offline — some features may not work</div>;
}

// ─── WEATHER ───
// dayOffset: 0 = today's current weather, N > 0 = forecast N days out.
// Open-Meteo supports up to ~16 day forecast; values outside that render nothing.
function Weather({loc,compact,dayOffset=0}){
  const[wx,setWx]=useState(null);
  const off=dayOffset;
  const outOfRange=off<0 || off>15;

  useEffect(()=>{
    if(!loc || !LOCS[loc] || outOfRange){setWx(null);return;}
    const{lat,lon}=LOCS[loc];
    const days=Math.max(off+2,3);
    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weathercode,uv_index_max&current=temperature_2m,weathercode&timezone=America/Belize&forecast_days=${days}`)
      .then(r=>r.json()).then(d=>{if(d.daily)setWx(d)}).catch(()=>{});
  },[loc,off,outOfRange]);

  if(outOfRange) return <div style={{fontSize:11,color:"#7A9B8E",padding:4,fontStyle:"italic"}}>No forecast available</div>;
  if(!wx || !wx.daily || !wx.daily.time[off]) return <div style={{fontSize:12,color:"#7A9B8E",padding:4}}>Loading weather…</div>;

  const iconFor=c=>c<=1?"☀️":c<=3?"⛅":c<=55?"🌧️":"⛈️";
  const t=wx.daily;
  const uv=t.uv_index_max?.[off]!=null ? Math.round(t.uv_index_max[off]) : null;
  const headFontSize=compact?16:20;

  return <div>
    {off===0 ? (
      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:compact?4:6}}>
        <span style={{fontSize:headFontSize}}>{iconFor(wx.current?.weathercode)}</span>
        <span style={{fontSize:headFontSize,fontWeight:700,color:"#E8A838"}}>{Math.round(wx.current?.temperature_2m)}°C</span>
        <span style={{fontSize:10,color:"#7BBAA0",fontWeight:600}}>NOW</span>
      </div>
    ) : (
      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:compact?4:6}}>
        <span style={{fontSize:headFontSize}}>{iconFor(t.weathercode[off])}</span>
        <span style={{fontSize:headFontSize,fontWeight:700,color:"#E8A838"}}>{Math.round(t.temperature_2m_max[off])}°C</span>
        <span style={{fontSize:10,color:"#7BBAA0",fontWeight:600}}>FORECAST</span>
        <span style={{fontSize:9,color:"#7A9B8E"}}>{t.time[off]}</span>
      </div>
    )}
    <div style={{display:"flex",gap:6}}>
      {[off,off+1].filter(i=>i<t.time.length).map(i=>
        <div key={t.time[i]} style={{background:"rgba(0,0,0,.2)",borderRadius:10,padding:"5px 8px",flex:1,textAlign:"center"}}>
          <div style={{fontSize:8,color:"#7BBAA0",fontWeight:600}}>{i===off?(off===0?"TODAY":"THIS DAY"):"NEXT"}</div>
          <div style={{fontSize:12}}>{iconFor(t.weathercode[i])}</div>
          <div style={{fontSize:12,fontWeight:700,color:"#E8A838"}}>{Math.round(t.temperature_2m_max[i])}°</div>
          <div style={{fontSize:10,color:"#9BB8A8"}}>{Math.round(t.temperature_2m_min[i])}°</div>
          <div style={{fontSize:8,color:"#56B4D3"}}>💧{t.precipitation_probability_max[i]}%</div>
        </div>
      )}
    </div>
    {!compact && uv!=null && <div style={{marginTop:6,padding:"4px 8px",background:"rgba(232,168,56,.1)",borderRadius:8,fontSize:11,color:"#E8A838"}}>
      🧴 UV Index: <strong>{uv}/11</strong> — {uv>=8?"Very High! Reapply sunscreen every 2hrs":uv>=6?"High — wear sunscreen & hat":"Moderate"}
    </div>}
  </div>;
}

// ─── MAP GEOMETRY HELPERS ───
async function fetchDriveRoute(from,to){
  try{
    const url=`https://router.project-osrm.org/route/v1/driving/${from.lon},${from.lat};${to.lon},${to.lat}?overview=full&geometries=geojson`;
    const r=await fetch(url), d=await r.json();
    if(d.routes?.[0]?.geometry) return d.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]);
  }catch{}
  return [[from.lat,from.lon],[to.lat,to.lon]]; // fallback: straight line
}
function flightArc(from,to,n=30){
  const pts=[];
  const dx=to.lon-from.lon, dy=to.lat-from.lat;
  const bulge=Math.min(Math.sqrt(dx*dx+dy*dy)*0.15, 5);
  for(let i=0;i<=n;i++){
    const t=i/n;
    pts.push([from.lat + t*dy + bulge*Math.sin(Math.PI*t), from.lon + t*dx]);
  }
  return pts;
}
function boatCurve(from,to){
  // 3-point curve so the transport icon has a midpoint with bearing
  const mid=[(from.lat+to.lat)/2+0.01, (from.lon+to.lon)/2+0.005];
  return [[from.lat,from.lon], mid, [to.lat,to.lon]];
}
function bearingDeg(prev,next){
  return Math.atan2(next[1]-prev[1], next[0]-prev[0]) * 180/Math.PI;
}

// ─── TRIP MAP ───
function TripMap({tripDay,groupFilter="ALL"}){
  const mapRef=useRef(null), mapInst=useRef(null);
  const layers=useRef({routes:[],markers:[],gps:null});
  const tilesRef=useRef(null);
  const[sat,setSat]=useState(false);

  const getPt=id=>MAP_PTS.find(p=>p.id===id);
  const pinColor=t=>t==="stay"?"#E8A838":t==="activity"?"#7BBAA0":"#56B4D3";

  // Initialize map + live GPS watcher (runs once)
  useEffect(()=>{
    if(mapInst.current || !mapRef.current) return;
    const m=L.map(mapRef.current,{zoomControl:false,attributionControl:false}).setView([17.2,-88.5],8);
    L.control.zoom({position:"bottomright"}).addTo(m);
    tilesRef.current=L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:18}).addTo(m);
    mapInst.current=m;

    let watchId=null;
    if(navigator.geolocation){
      watchId=navigator.geolocation.watchPosition(p=>{
        const ll=[p.coords.latitude,p.coords.longitude];
        if(layers.current.gps){layers.current.gps.setLatLng(ll);return;}
        const gi=L.divIcon({
          className:"",
          html:'<div style="position:relative"><div class="gps-pulse"></div><div style="position:absolute;top:4px;left:4px;width:12px;height:12px;background:#FF6B6B;border:2px solid #fff;border-radius:50%"></div></div>',
          iconSize:[20,20],iconAnchor:[10,10],
        });
        layers.current.gps=L.marker(ll,{icon:gi,zIndexOffset:1000}).bindTooltip("📍 You",{className:"pin-pop",direction:"top"}).addTo(m);
      },()=>{},{enableHighAccuracy:true,maximumAge:30000,timeout:10000});
    }
    return()=>{if(watchId!=null) navigator.geolocation?.clearWatch(watchId);};
  },[]);

  // Swap tiles when toggling satellite
  useEffect(()=>{
    if(!mapInst.current || !tilesRef.current) return;
    mapInst.current.removeLayer(tilesRef.current);
    tilesRef.current=L.tileLayer(
      sat
        ? "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"
        : "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
      {maxZoom:18}
    ).addTo(mapInst.current);
  },[sat]);

  // Redraw routes & markers when day or filter changes
  useEffect(()=>{
    if(!mapInst.current) return;
    const m=mapInst.current;
    layers.current.routes.forEach(l=>m.removeLayer(l));
    layers.current.markers.forEach(l=>m.removeLayer(l));
    layers.current.routes=[]; layers.current.markers=[];

    const dy=Math.max(tripDay,0);
    const inBZ=dy>=1 && dy<=9;
    const rt=dy<DAY_RT.length ? DAY_RT[dy] : null;
    const gf=groupFilter;
    const bounds=[];

    // Past days: faded dashed trails
    DAY_RT.slice(0,dy).forEach(dr=>{
      dr.segs.forEach(s=>{
        const f=getPt(s.from), t=getPt(s.to); if(!f||!t) return;
        layers.current.routes.push(
          L.polyline([[f.lat,f.lon],[t.lat,t.lon]],{color:"rgba(123,186,160,.2)",weight:1.5,dashArray:"6,4"}).addTo(m)
        );
      });
    });

    // Draw a single segment: polyline + rotated transport icon at midpoint
    const drawSeg=async(s,color,isSecondary)=>{
      const f=getPt(s.from), t=getPt(s.to); if(!f||!t) return;
      bounds.push([f.lat,f.lon],[t.lat,t.lon]);
      const pts =
        s.t==="drive" ? await fetchDriveRoute(f,t) :
        s.t==="fly"   ? flightArc(f,t) :
        s.t==="boat"  ? boatCurve(f,t) :
                        [[f.lat,f.lon],[t.lat,t.lon]];
      const weight  = isSecondary ? 2.5 : (s.t==="drive" ? 3.5 : 2.5);
      const opacity = isSecondary ? 0.7 : 0.85;
      layers.current.routes.push(L.polyline(pts,{color,weight,opacity}).addTo(m));

      const mi=Math.floor(pts.length/2);
      const mid=pts[mi];
      const prev=pts[Math.max(mi-1,0)], next=pts[Math.min(mi+1,pts.length-1)];
      const ang=bearingDeg(prev,next);
      const ti=L.divIcon({
        className:"",
        html:`<div style="font-size:22px;line-height:1;text-shadow:0 2px 4px rgba(0,0,0,.5);transform:rotate(${ang}deg);transform-origin:center center">${TRANSPORT_ICON[s.t]}</div>`,
        iconSize:[26,26],iconAnchor:[13,13],
      });
      layers.current.markers.push(L.marker(mid,{icon:ti,interactive:false}).addTo(m));
    };

    // Tag floating above a pin ("who's where" on split days)
    const addBadge=(ptId,html,color)=>{
      const p=getPt(ptId); if(!p) return;
      const di=L.divIcon({
        className:"",
        html:`<div style="background:${color};padding:2px 8px;border-radius:10px;font-size:13px;white-space:nowrap">${html}</div>`,
        iconSize:[80,24],iconAnchor:[-10,12],
      });
      layers.current.markers.push(L.marker([p.lat,p.lon],{icon:di,zIndexOffset:500}).addTo(m));
    };

    const render=async()=>{
      if(rt){
        // Main segments (DAS perspective, also used for CV)
        if(gf==="ALL" || gf==="DAS" || gf==="CV")
          for(const s of rt.segs) await drawSeg(s,"#E8A838",false);
        if(rt.gark && (gf==="ALL" || gf==="GARK"))
          for(const s of rt.gark) await drawSeg(s,"#3B9B8F", gf==="ALL");
        if(rt.cv && (gf==="ALL" || gf==="CV"))
          for(const s of rt.cv) await drawSeg(s,"#C06050", gf==="ALL");
      }

      // POI pins
      const activeIds = rt
        ? [...rt.segs, ...(rt.gark||[]), ...(rt.cv||[])].flatMap(s=>[s.from,s.to])
        : [];
      MAP_PTS
        .filter(p => inBZ ? (p.lat>15 && p.lat<19) : true)
        .forEach(p=>{
          const hot=activeIds.includes(p.id);
          const col=pinColor(p.type), sz=hot?14:10;
          const icon=L.divIcon({
            className:"",
            html:`<div style="width:${sz}px;height:${sz}px;background:${col};border:2px solid ${hot?"#fff":"rgba(255,255,255,.3)"};border-radius:50%;box-shadow:0 0 ${hot?8:4}px ${col}"></div>`,
            iconSize:[sz,sz],iconAnchor:[sz/2,sz/2],
          });
          const mk=L.marker([p.lat,p.lon],{icon}).addTo(m);
          mk.bindPopup(`<div class="pin-pop"><strong>${p.name}</strong>${p.info?`<br/><span style="color:#666">${p.info}</span>`:""}</div>`);
          layers.current.markers.push(mk);
          if(hot) bounds.push([p.lat,p.lon]);
        });

      // Split-day "who's where" badges
      if((dy===7||dy===8) && (gf==="ALL"||gf==="DAS"||gf==="CV"))
        addBadge("cc","🌸😎🐛🦜","rgba(232,168,56,.9)");
      if(dy===7 && (gf==="ALL"||gf==="GARK"))
        addBadge("sc","🐆🐉🐨🦁","rgba(59,155,143,.9)");
      if(dy===8 && (gf==="ALL"||gf==="GARK"))
        addBadge("bze","🐆🐉✈️🏠","rgba(59,155,143,.9)");

      if(bounds.length>1) m.fitBounds(bounds,{padding:[40,40],maxZoom:inBZ?12:6});
      else if(bounds.length===1) m.setView(bounds[0],inBZ?11:6);
      else if(inBZ) m.setView([17.2,-88.5],8);
    };
    render();
  },[tripDay,sat,groupFilter]);

  return <div style={{position:"relative"}}>
    <div ref={mapRef} style={{height:380,borderRadius:16,overflow:"hidden"}}/>
    <button onClick={()=>setSat(!sat)} style={{position:"absolute",top:10,right:10,zIndex:1000,background:"rgba(12,34,51,.9)",border:"1px solid rgba(255,255,255,.2)",borderRadius:8,padding:"6px 10px",color:"#E8E4DF",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{sat?"🗺️ Street":"🛰️ Satellite"}</button>
    <div style={{display:"flex",gap:8,justifyContent:"center",marginTop:6,flexWrap:"wrap"}}>
      <span style={{fontSize:9,color:"#E8A838"}}>━ DAS route</span>
      <span style={{fontSize:9,color:"#3B9B8F"}}>┅ GARK</span>
      <span style={{fontSize:9,color:"#C06050"}}>┅ CV</span>
      <span style={{fontSize:9,color:"rgba(123,186,160,.5)"}}>┄ Past</span>
      <span style={{fontSize:9,color:"#FF6B6B"}}>● GPS</span>
    </div>
  </div>;
}

// ─── ITINERARY TAB ───
function ItineraryTab({sel,setSel,filt,setFilt,persona}){
  const td=getTD();
  const d=DAYS[sel], lk=sel<DLOC.length ? DLOC[sel] : null;
  // Live forecast only makes sense for future trip days. Otherwise show compact current weather.
  const liveForecastOff = td>=0 ? sel-td : null;
  const canShowForecast = liveForecastOff!=null && liveForecastOff>=0 && liveForecastOff<=14;

  const visible=d.events.filter(e=>
    filt==="ALL" || e.group==="ALL" || e.group===filt || (e.group==="ALL_NO_CV" && filt!=="CV")
  );
  // When filter is ALL, dim events outside the user's persona group; when explicitly filtered, show all visible at full opacity.
  const dimFor=e => filt==="ALL" && !eventMatchesPersona(e,persona);

  return <div className="f">
    <div style={{display:"flex",gap:5,overflowX:"auto",paddingBottom:8,marginBottom:10}}>
      {DAYS.map((day,i)=>
        <button key={i} onClick={()=>setSel(i)} style={{flex:"none",padding:"7px 10px",borderRadius:12,background:sel===i?day.color:"rgba(255,255,255,.05)",border:i===td&&sel!==i?`1px solid ${day.color}`:"1px solid transparent",color:sel===i?"#fff":"#9BB8A8",cursor:"pointer",textAlign:"center",minWidth:52}}>
          <div style={{fontSize:16}}>{day.icon}</div>
          <div style={{fontSize:9,fontWeight:600,marginTop:1}}>{day.date.split(" ")[1]} {day.date.split(" ")[2]}</div>
          {i===td && <div style={{fontSize:7,color:sel===i?"#FFD":day.color,fontWeight:700}}>TODAY</div>}
        </button>
      )}
    </div>

    <div key={sel}>
      <div style={{background:`linear-gradient(135deg,${d.color}22,${d.color}08)`,borderRadius:16,padding:14,border:`1px solid ${d.color}33`,marginBottom:10}}>
        <div style={{...S.caption,color:d.color}}>{d.date} · Day {d.dn}</div>
        <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:22,color:"#F4EDE4",marginTop:2}}>{d.title}</h2>
        <div style={{fontSize:12,color:"#9BB8A8"}}>📍 {d.loc}</div>
        {lk && <div style={{marginTop:10}}>
          {canShowForecast
            ? <Weather loc={lk} dayOffset={liveForecastOff}/>
            : <Weather loc={lk} dayOffset={0} compact/>}
        </div>}
      </div>

      <PackCard dayIdx={sel}/>
      <AccomCard dayIdx={sel}/>

      <div style={{display:"flex",gap:4,marginBottom:8}}>
        {GROUP_FILTERS.map(f=>
          <button key={f} onClick={()=>setFilt(f)} style={{padding:"3px 10px",fontSize:11,borderRadius:8,background:filt===f?"rgba(255,255,255,.12)":"rgba(255,255,255,.04)",border:"none",color:filt===f?"#F4EDE4":"#7A9B8E",cursor:"pointer",fontWeight:filt===f?600:400}}>{f==="ALL"?"All":f}</button>
        )}
      </div>

      {visible.map((e,i)=><EventRow key={i} event={e} dim={dimFor(e)}/>)}

      <div style={{...S.card,marginTop:12}}>
        <div style={{...S.caption,color:"#7BBAA0",marginBottom:6}}>🗺️ Day {d.dn} Route</div>
        <TripMap tripDay={sel} groupFilter={filt}/>
      </div>
    </div>
  </div>;
}

// ─── EXPENSES TAB ───
function useExpenses(){
  const[exp,setExpState]=useState(()=>loadJSON(LS_EXP,INIT_EXP));
  const save=next=>{setExpState(next); LS.set(LS_EXP,JSON.stringify(next))};
  return[exp,save];
}
function ExpensesTab(){
  const[exp,setExp]=useExpenses();
  const[showAdd,setShowAdd]=useState(false);
  const emptyDraft={item:"",amount:"",paidBy:"CV",cat:EXP_CATS[0]};
  const[draft,setDraft]=useState(emptyDraft);

  const settle=useMemo(()=>{
    const by={DAS:0,GARK:0,CV:0,TBD:0};
    exp.forEach(e=>{if(by[e.paidBy]!==undefined) by[e.paidBy]+=e.amount});
    return{total:exp.reduce((s,e)=>s+e.amount,0), by};
  },[exp]);

  const addExpense=()=>{
    if(!draft.item || !draft.amount) return;
    setExp([...exp,{id:Date.now(),...draft,amount:parseFloat(draft.amount)}]);
    setDraft(emptyDraft);
    setShowAdd(false);
  };
  const updatePayer=(id,paidBy)=>setExp(exp.map(x=>x.id===id?{...x,paidBy}:x));
  const removeExpense=id=>setExp(exp.filter(x=>x.id!==id));

  return <div className="f">
    <div style={{...S.card,background:"linear-gradient(135deg,rgba(192,96,80,.12),rgba(123,186,160,.08))"}}>
      <div style={{...S.caption,color:"#C06050",marginBottom:4}}>🦜 CV covers everything — for Gita</div>
      <div style={{fontSize:28,fontWeight:700}}>{fmtMoney(settle.total,0)}</div>
      {(settle.by.DAS>0 || settle.by.GARK>0) && <div style={{marginTop:8,padding:"8px 10px",background:"rgba(0,0,0,.2)",borderRadius:10,fontSize:12}}>
        <div style={{fontWeight:700,color:"#E8A838",marginBottom:4}}>💰 CV Reimbursements:</div>
        {settle.by.DAS>0  && <div>CV → DAS: <strong>{fmtMoney(settle.by.DAS)}</strong></div>}
        {settle.by.GARK>0 && <div>CV → GARK: <strong>{fmtMoney(settle.by.GARK)}</strong></div>}
      </div>}
      {settle.by.TBD>0 && <div style={{fontSize:11,color:"#E8A838",marginTop:6}}>⚠️ {fmtMoney(settle.by.TBD,0)} needs payer assigned</div>}
    </div>

    <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
      <div style={{fontSize:13,fontWeight:700}}>All Expenses</div>
      <button onClick={()=>setShowAdd(!showAdd)} style={S.primaryBtn}>+ Add</button>
    </div>

    {showAdd && <div style={{...S.card,background:"rgba(255,255,255,.06)"}}>
      <input placeholder="What?" value={draft.item} onChange={e=>setDraft({...draft,item:e.target.value})} style={{...S.input,width:"100%",marginBottom:6}}/>
      <div style={{display:"flex",gap:6,marginBottom:6}}>
        <input type="number" placeholder="$" value={draft.amount} onChange={e=>setDraft({...draft,amount:e.target.value})} style={{...S.input,flex:1}}/>
        <select value={draft.paidBy} onChange={e=>setDraft({...draft,paidBy:e.target.value})} style={{...S.input,flex:1}}>
          {PAYER_OPTIONS.map(p=><option key={p} value={p}>{p}</option>)}
        </select>
      </div>
      <select value={draft.cat} onChange={e=>setDraft({...draft,cat:e.target.value})} style={{...S.input,width:"100%",marginBottom:6}}>
        {EXP_CATS.map(c=><option key={c} value={c}>{c}</option>)}
      </select>
      <button onClick={addExpense} style={{width:"100%",padding:10,borderRadius:8,background:"#7BBAA0",color:"#0C2233",border:"none",fontSize:13,fontWeight:700,cursor:"pointer"}}>Add</button>
    </div>}

    {EXP_CATS.map(cat=>{
      const items=exp.filter(e=>e.cat===cat); if(!items.length) return null;
      return <div key={cat} style={{marginBottom:8}}>
        <div style={{...S.caption,color:"#7BBAA0",padding:"6px 0 3px"}}>{cat}</div>
        {items.map(e=>
          <div key={e.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 10px",background:"rgba(255,255,255,.03)",borderRadius:10,marginBottom:2}}>
            <div style={{flex:1,fontSize:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.item}</div>
            <div style={{display:"flex",alignItems:"center",gap:5,flexShrink:0}}>
              <span style={{fontSize:13,fontWeight:700}}>{fmtMoney(e.amount)}</span>
              <select value={e.paidBy} onChange={ev=>updatePayer(e.id,ev.target.value)} style={{padding:"2px 4px",fontSize:10,borderRadius:6,border:"1px solid rgba(255,255,255,.15)",background:e.paidBy==="TBD"?"rgba(232,168,56,.2)":"rgba(0,0,0,.3)",color:e.paidBy==="TBD"?"#E8A838":"#E8E4DF",fontWeight:600}}>
                {PAYER_OPTIONS_WITH_TBD.map(p=><option key={p} value={p}>{p}</option>)}
              </select>
              <button onClick={()=>removeExpense(e.id)} style={{background:"none",border:"none",color:"#7A9B8E",cursor:"pointer",fontSize:14}}>×</button>
            </div>
          </div>
        )}
      </div>;
    })}
  </div>;
}

    const day = td>=0 && td<DAYS.length ? DAYS[td].date : "Off-trip";
    setJournal([{
      id:Date.now(),
      text:jText.trim(),
      mood:jMood,
      day,
      ts:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}),

      {journal.map(e=><JournalEntry key={e.id} entry={e} onDelete={()=>setJournal(journal.filter(j=>j.id!==e.id))}/>)}

    {/* Essentials */}
    <div style={S.card}>
      <h3 style={S.h3}>🧳 Essentials</h3>
      {ESSENTIALS.map(e=>
        <div key={e.title} style={{display:"flex",gap:10,padding:"6px 0",...S.rowDivider}}>
          <div style={{fontSize:16,width:24,textAlign:"center",flexShrink:0}}>{e.icon}</div>

            <div style={{fontSize:13,fontWeight:700}}>{e.title}</div>

    {/* Kriol */}
    <div style={tintCard("rgba(232,168,56,.04)")}>
      <h3 style={S.h3}>🗣️ Kriol Phrasebook</h3>
      <div style={{fontSize:11,color:"#9BB8A8",marginBottom:8}}>Tap 🔊 to hear approximate pronunciation</div>
      {KRIOL.map((p,i)=>
        <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",...S.rowDivider}}>
          <div>
            <span style={{fontWeight:700,color:"#E8A838",fontStyle:"italic"}}>{p.k}</span>
            <span style={{color:"#9BB8A8",marginLeft:6}}>{p.e}</span>
          </div>
          <button onClick={()=>speakKriol(p.tts)} style={{background:"none",border:"none",cursor:"pointer",fontSize:14,padding:2}}>🔊</button>
        </div>
      )}
    </div>

    {/* Restaurants */}
    <div style={S.card}>
      <h3 style={S.h3}>🍽️ Restaurants</h3>
      {Object.entries(RESTS).map(([area,items])=>
        <div key={area} style={{marginBottom:8}}>
          <div style={{...S.caption,color:"#E8A838",marginBottom:3}}>{area}</div>
          {items.map(r=>
            <div key={r.n} style={{padding:"3px 0 3px 10px",borderLeft:"2px solid rgba(232,168,56,.3)"}}>
              <span style={{fontSize:13,fontWeight:600}}>{r.n}</span>
              <span style={{fontSize:11,color:"#9BB8A8"}}> — {r.d}</span>
            </div>
          )}
        </div>
      )}
    </div>

    {/* Contacts */}
    <div style={S.card}>
      <h3 style={S.h3}>📞 Contacts</h3>
      {CONTACTS.map(c=>
        <div key={c.name} style={{padding:"6px 0",...S.rowDivider}}>
          <div style={{fontSize:13,fontWeight:700}}>{c.name}</div>
          <div style={{display:"flex",gap:8,marginTop:2,flexWrap:"wrap"}}>
            {c.phone && <a href={"tel:"+c.phone.replace(/\s/g,"")} style={{fontSize:11,color:"#7BBAA0",textDecoration:"none"}}>📱 {c.phone}</a>}
            {c.email && <span style={{fontSize:11,color:"#9BB8A8"}}>✉️ {c.email}</span>}
            {c.wa    && <span style={{fontSize:10,background:"rgba(37,211,102,.15)",color:"#25D366",padding:"1px 6px",borderRadius:4}}>WhatsApp</span>}
          </div>
        </div>
      )}
    </div>

    {/* Emergency */}
    <div style={{...S.card,borderColor:"rgba(192,96,80,.2)"}}>
      <h3 style={S.h3}>🚨 Emergency</h3>
      {EMERG.map(e=>
        <div key={e.l} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",...S.rowDivider}}>
          <div>
            <div style={{fontSize:12,fontWeight:600}}>{e.l}</div>
            {e.note && <div style={{fontSize:10,color:"#7A9B8E"}}>{e.note}</div>}
          </div>
          <a href={"tel:"+e.n.replace(/\s/g,"")} style={{fontSize:13,fontWeight:700,color:"#7BBAA0",textDecoration:"none"}}>{e.n}</a>
        </div>
      )}
    </div>

    {/* Flights */}
    <div style={S.card}>
      <h3 style={S.h3}>✈️ All Flights</h3>
      {FLIGHTS.map(f=>
        <a key={f.code} href={f.url} target="_blank" rel="noopener noreferrer" style={{display:"flex",justifyContent:"space-between",padding:"8px 10px",background:"rgba(0,0,0,.15)",borderRadius:10,marginBottom:4,textDecoration:"none",color:"#E8E4DF"}}>
          <div><span style={{fontWeight:700}}>{f.code}</span> <span style={{color:"#9BB8A8"}}>{f.label}</span></div>
          <span style={{color:"#56B4D3",fontWeight:700}}>Track ↗</span>
        </a>
      )}
    </div>

    {/* Weather */}
    <div style={{...S.card,background:"linear-gradient(135deg,rgba(232,168,56,.08),rgba(123,186,160,.08))"}}>
      <h3 style={S.h3}>☀️ Live Weather</h3>
      {Object.keys(LOCS).map(k=>
        <div key={k} style={{marginBottom:12}}>
          <div style={{fontSize:12,fontWeight:700,color:"#E8A838",marginBottom:4}}>📍 {k}</div>
          <Weather loc={k} compact/>
        </div>
      )}
    </div>
  </div>;
}

// ─── APP ───
function App(){
  const[persona,setPersona]=usePersona();
  const[tab,setTab]=useState(0);
  const[sel,setSel]=useState(()=>Math.max(0,getTD()));
  const[filt,setFilt]=useState("ALL");

  // Welcome screen gates the app until persona is chosen.
  if(!persona) return <PersonaPicker onPick={setPersona}/>;

  return <div style={{background:"linear-gradient(160deg,#0C2233 0%,#0A3142 30%,#0E4A3C 70%,#183028 100%)",minHeight:"100vh",color:"#E8E4DF"}}>
    <OfflineBar/>

    {/* Header */}
    <div style={{padding:"24px 20px 8px",textAlign:"center"}}>
      <div style={{...S.caption,color:"#7BBAA0",letterSpacing:4}}>April 10 – 20, 2026</div>
      <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:36,fontWeight:700,color:"#F4EDE4",letterSpacing:-1,lineHeight:1}}>Belize</h1>
      <div style={{display:"flex",justifyContent:"center",gap:8,marginTop:10,flexWrap:"wrap"}}>
        {FAMILIES.map(f=>
          <div key={f.code} style={{background:f.color+"18",border:`1px solid ${f.color}44`,borderRadius:12,padding:"6px 12px",textAlign:"center"}}>
            <div style={{fontSize:16,letterSpacing:2}}>{f.members.map(m=>m.icon).join(" ")}</div>
            <div style={{fontSize:9,color:f.color,fontWeight:600,marginTop:2}}>{f.members.map(m=>m.name).join(" · ")}</div>
          </div>
        )}
      </div>
      <div style={{marginTop:10}}>
        <PersonaChip persona={persona} onChange={setPersona}/>
      </div>
    </div>

    {/* Tabs */}
    <div style={{display:"flex",padding:"0 6px",marginTop:6,overflowX:"auto"}}>
      {TABS.map((t,i)=>
        <button key={t} onClick={()=>setTab(i)} style={{flex:"none",padding:"9px 12px",fontSize:12,fontWeight:tab===i?700:500,color:tab===i?"#F4EDE4":"#7A9B8E",background:tab===i?"rgba(255,255,255,.08)":"transparent",border:"none",borderBottom:tab===i?"2px solid #E8A838":"2px solid transparent",cursor:"pointer",borderRadius:"8px 8px 0 0"}}>{t}</button>
      )}
    </div>

    <div style={{padding:"12px 16px 80px"}}>
      {tab===0 && <TodayTab persona={persona}/>}
      {tab===1 && <ItineraryTab sel={sel} setSel={setSel} filt={filt} setFilt={setFilt} persona={persona}/>}
      {tab===2 && <ExpensesTab/>}
      {tab===3 && <GuideTab persona={persona}/>}
    </div>
  </div>;
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
